      html += '      <div style="display:flex;align-items:center;gap:6px;margin-top:6px;">';
      html += '        <label style="font-size:11px;color:#888;white-space:nowrap;">Space below:</label>';
      html += '        <input type="range" min="0" max="80" step="2" value="' + ie.spacingBelow + '"';
      html += '          style="flex:1;accent-color:' + (ie.spacingBelow !== ie.originalSpacingBelow ? '#e67e22' : '#3498db') + ';"';
      html += '          oninput="handleElementSpacing(\'' + section.id + '\',\'' + ie.id + '\',\'image\',this.value)"';
      html += '          title="' + ie.spacingBelow + 'px">';
      html += '        <span style="font-size:11px;color:#888;min-width:30px;">' + ie.spacingBelow + 'px</span>';
      html += '      </div>';
      html += (changed ? '      <button class="reset-btn" onclick="resetElement(\'' + section.id + '\',\'' + ie.id + '\',\'image\')">Reset</button>' : '');
      html += '    </div>';
      html += '    <div class="reorder-btns">';
      html += '      <button class="reorder-btn" onclick="moveImageElement(\'' + section.id + '\',\'' + ie.id + '\',-1)" ' + (visIdx === 0 ? 'disabled' : '') + ' title="Move up">&#9650;</button>';
      html += '      <button class="reorder-btn" onclick="moveImageElement(\'' + section.id + '\',\'' + ie.id + '\',1)" ' + (visIdx === visibleImages.length - 1 ? 'disabled' : '') + ' title="Move down">&#9660;</button>';
      html += '    </div>';
      html += '  </div>';
      html += '</div>';
      // Insert point after this image
      html += '<button class="insert-media-btn" onclick="startInsertMediaAfterImage(\'' + section.id + '\',\'' + ie.id + '\')">+ Insert media after this image</button>';

      // Render any addedMedia associated with this image inline
      if (mediaByImageId[ie.id]) {
        const group = mediaByImageId[ie.id];
        group.forEach((am, gi) => {
          const dw = am.displayWidth || 100;
          const minPx = Math.round(dw * 12);
          const tooSmall = am.width < minPx;
          html += '<div class="element-group changed" style="margin:4px 0;border-left:3px solid #e67e22;">';
          html += '  <div class="el-label"><span class="el-tag" style="background:#e67e22;">New image</span></div>';
          html += '  <div style="display:flex;align-items:flex-start;gap:6px;">';
          html += '    <div class="added-media-item" style="flex:1;">';
          html += '      <img src="data:image/jpeg;base64,' + am.base64 + '" alt="">';
          html += '      <div class="ami-details">';
          html += '        <div class="ami-dims">' + am.width + ' x ' + am.height + '</div>';
          html += '        <select onchange="handleAddedMediaWidth(\'' + section.id + '\',\'' + am.id + '\',this.value)">';
          [100,75,66,55,50,33,25].forEach(w => {
            html += '<option value="' + w + '"' + (w === dw ? ' selected' : '') + '>' + w + '% width</option>';
          });
          html += '        </select>';
          if (tooSmall) html += '<div class="ami-warning">Low res: only ' + am.width + 'px wide (recommend ' + minPx + 'px+)</div>';
          html += '        <input type="text" value="' + escapeAttr(am.alt) + '" placeholder="Alt text"';
          html += '          oninput="handleAddedMediaAlt(\'' + section.id + '\',\'' + am.id + '\',this.value)">';
          html += '      </div>';
          html += '      <button class="ami-remove" onclick="removeAddedMedia(\'' + section.id + '\',\'' + am.id + '\')" title="Remove">x</button>';
          html += '    </div>';
          html += '    <div class="reorder-btns">';
          html += '      <button class="reorder-btn" onclick="moveAddedMedia(\'' + section.id + '\',\'' + am.id + '\',-1)" ' + (am._globalIdx === 0 ? 'disabled' : '') + ' title="Move up">&#9650;</button>';
          html += '      <button class="reorder-btn" onclick="moveAddedMedia(\'' + section.id + '\',\'' + am.id + '\',1)" ' + (am._globalIdx === section.addedMedia.length - 1 ? 'disabled' : '') + ' title="Move down">&#9660;</button>';
          html += '    </div>';
          html += '  </div>';
          html += '</div>';
        });
      }
    }
  });

  // Unassociated added media (added via "Add Media" button, no specific position)
  if (unassociatedMedia.length > 0) {
    html += '<div class="element-group changed">';
    html += '  <div class="el-label">';
    html += '    <span class="el-tag">Added Media</span>';
    html += '    <span class="el-changed">' + unassociatedMedia.length + ' new (appended at end)</span>';
    html += '  </div>';

    unassociatedMedia.forEach((am, i) => {
      const dw = am.displayWidth || 100;
      const minPx = Math.round(dw * 12);
      const tooSmall = am.width < minPx;
      html += '<div style="display:flex;align-items:flex-start;">';
      html += '  <div class="added-media-item" style="flex:1;">';
      html += '    <img src="data:image/jpeg;base64,' + am.base64 + '" alt="">';
      html += '    <div class="ami-details">';
      html += '      <div class="ami-dims">' + am.width + ' x ' + am.height + '</div>';
      html += '      <select onchange="handleAddedMediaWidth(\'' + section.id + '\',\'' + am.id + '\',this.value)">';
      [100,75,66,55,50,33,25].forEach(w => {
        html += '<option value="' + w + '"' + (w === dw ? ' selected' : '') + '>' + w + '% width</option>';
      });
      html += '      </select>';
      if (tooSmall) html += '<div class="ami-warning">Low res: only ' + am.width + 'px wide (recommend ' + minPx + 'px+)</div>';
      html += '      <input type="text" value="' + escapeAttr(am.alt) + '" placeholder="Alt text"';
      html += '        oninput="handleAddedMediaAlt(\'' + section.id + '\',\'' + am.id + '\',this.value)">';
      html += '    </div>';
      html += '    <button class="ami-remove" onclick="removeAddedMedia(\'' + section.id + '\',\'' + am.id + '\')" title="Remove">x</button>';
      html += '  </div>';
      html += '  <div class="reorder-btns">';
      html += '    <button class="reorder-btn" onclick="moveAddedMedia(\'' + section.id + '\',\'' + am.id + '\',-1)" ' + (i === 0 ? 'disabled' : '') + ' title="Move up">&#9650;</button>';
      html += '    <button class="reorder-btn" onclick="moveAddedMedia(\'' + section.id + '\',\'' + am.id + '\',1)" ' + (i === unassociatedMedia.length - 1 ? 'disabled' : '') + ' title="Move down">&#9660;</button>';
      html += '  </div>';
      html += '</div>';
    });
    html += '</div>';
  }

  // Add Media button (appends at end)
  html += `<button class="add-media-btn" onclick="startAddMedia('${section.id}')">+ Add Media</button>`;

  col.innerHTML = html;
  } catch(err) {
    console.error('[renderEditor] CRASH:', err);
    col.innerHTML = '<div style="color:red;padding:20px;"><strong>Editor render error:</strong> ' + err.message + '<br><br>Added media: ' + (section.addedMedia ? section.addedMedia.length : 0) + '</div>';
  }
}

function resolveImageUrl(src) {
  if (src.startsWith('http')) return src;
  // Resolve relative to site base URL
  return getSiteBaseUrl() + src.replace(/^\.\//, '');
}

// ==========================================
// EVENT HANDLERS
// ==========================================
let _undoPushedForField = null;

function handleTextEditFocus(el) {
  const key = el.dataset.section + ':' + el.dataset.element;
  if (_undoPushedForField !== key) {
    pushUndo('edit text');
    _undoPushedForField = key;
  }
}

function handleTextEditBlur() {
  _undoPushedForField = null;
}

function handleTextEdit(el) {
  const sectionId = el.dataset.section;
  const elementId = el.dataset.element;
  const value = el.value;
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  const te = section.textElements.find(t => t.id === elementId);
  if (te) {
    // Text currently shown in the preview (for selector-fallback matching).
    // Starts as the original content, then tracks each value we send.
    const prevDisplayed = (te._lastPreviewText !== undefined) ? te._lastPreviewText : te.originalContent;
    te.content = value;
    // Convert newlines to <br> for preview display
    const previewValue = value.replace(/\n/g, '<br>');
    updatePreviewInstant(te.selector, 'text', previewValue, prevDisplayed);
    te._lastPreviewText = value;
  }
  renderSections();
  updateChangeCount();
}

let _undoPushedForAlt = null;

function handleAltEditFocus(el) {
  const key = el.dataset.section + ':' + el.dataset.element;
  if (_undoPushedForAlt !== key) {
    pushUndo('edit alt text');
    _undoPushedForAlt = key;
  }
}

function handleAltEditBlur() {
  _undoPushedForAlt = null;
}

function handleAltEdit(el) {
  const sectionId = el.dataset.section;
  const elementId = el.dataset.element;
  const value = el.value;
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  const ie = section.imageElements.find(i => i.id === elementId);
  if (ie) {
    ie.alt = value;
    // Manual alt edit unlinks it from the caption (so it keeps its own value).
    if (ie.captionSupported && ie.altLinked) {
      ie.altLinked = false;
      renderEditor(); // refresh the "mirrors caption" indicator
    }
    updatePreviewInstant(ie.selector, 'alt', value);
  }
  renderSections();
  updateChangeCount();
}

// === CAPTION EDITING ===
let _undoPushedForCaption = null;

function handleCaptionEditFocus(el) {
  const key = el.dataset.section + ':' + el.dataset.element;
  if (_undoPushedForCaption !== key) {
    pushUndo('edit caption');
    _undoPushedForCaption = key;
  }
}

function handleCaptionEditBlur() {
  _undoPushedForCaption = null;
}

function handleCaptionEdit(el) {
  const sectionId = el.dataset.section;
  const elementId = el.dataset.element;
  const value = el.value;
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  const ie = section.imageElements.find(i => i.id === elementId);
  if (ie) {
    ie.captionText = value;
    // Live preview: create/update/remove the visible caption next to the image.
    postToPreview({
      type: 'updateCaption',
      selector: ie.selector,
      value: value,
      captionTag: ie.captionTag,
      captionClass: ie.captionClass
    });
    // If alt is linked, mirror caption into alt.
    if (ie.altLinked) {
      ie.alt = value;
      updatePreviewInstant(ie.selector, 'alt', value);
    }
  }
  renderSections();
  updateChangeCount();
}

function relinkAlt(sectionId, elementId) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  const ie = section.imageElements.find(i => i.id === elementId);
  if (!ie) return;
  pushUndo('relink alt to caption');
  ie.altLinked = true;
  ie.alt = ie.captionText;
  updatePreviewInstant(ie.selector, 'alt', ie.alt);
  renderEditor();
  renderSections();
  updateChangeCount();
}

function toggleAltEdit(sectionId, elementId) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  const ie = section.imageElements.find(i => i.id === elementId);
  if (!ie) return;
  ie._altOpen = !ie._altOpen;
  renderEditor();
}

function deleteImage(sectionId, elementId) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  const ie = section.imageElements.find(i => i.id === elementId);
  if (ie) {
    pushUndo('delete image');
    ie.deleted = true;
    // Instantly hide in preview
    updatePreviewInstant(ie.selector, 'delete');
  }
  renderEditor();
  renderSections();
  updateChangeCount();
}

function restoreImage(sectionId, elementId) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  const ie = section.imageElements.find(i => i.id === elementId);
  if (ie) {
    ie.deleted = false;
    // Instantly restore in preview
    updatePreviewInstant(ie.selector, 'restore');
  }
  renderEditor();
  renderSections();
  updateChangeCount();
}

function deleteSection(sectionId) {
  if (!confirm('Delete this entire section? This can be undone with the restore button.')) return;
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  pushUndo('delete section');
  section.deleted = true;
  // Hide in preview
  postToPreview({ type: 'updateDisplay', selector: section.outerSelector, value: 'none' });
  renderEditor();
  renderSections();
  updateChangeCount();
}

function restoreSection(sectionId) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  pushUndo('restore section');
  section.deleted = false;
  // Show in preview
  postToPreview({ type: 'updateDisplay', selector: section.outerSelector, value: '' });
  renderEditor();
  renderSections();
  updateChangeCount();
}

// ==========================================
// INSTANT PREVIEW - via postMessage bridge
// ==========================================
function postToPreview(msg) {
  // If iframe is not ready yet, queue the message for delivery after load
  if (!_iframeReady) {
    _previewMsgQueue.push(msg);
    return;
  }
  const iframe = document.getElementById('previewFrame');
  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage(msg, '*');
  }
}

function updatePreviewInstant(selector, type, value, origValue) {
  if (type === 'text') {
    postToPreview({ type: 'updateText', selector, value, origValue });
  } else if (type === 'alt') {
    postToPreview({ type: 'updateAlt', selector, value });
  } else if (type === 'delete') {
    postToPreview({ type: 'updateDisplay', selector, value: 'none' });
  } else if (type === 'restore') {
    postToPreview({ type: 'updateDisplay', selector, value: '' });
  }
}

function startImageSwap(sectionId, elementId) {
  pushUndo('swap image');
  state.pendingImageSwap = { sectionId, elementId };
  document.getElementById('fileChooser').click();
}

document.getElementById('fileChooser').addEventListener('change', function(e) {
  if (!e.target.files.length || !state.pendingImageSwap) return;
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = function(ev) {
    const base64 = ev.target.result.split(',')[1];
    const { sectionId, elementId } = state.pendingImageSwap;
    const section = state.sections.find(s => s.id === sectionId);
    if (!section) return;
    const ie = section.imageElements.find(i => i.id === elementId);
    if (ie) {
      ie.newFileBase64 = base64;
      ie.newFileName = file.name.toLowerCase().replace(/\s+/g, '-');
      ie.src = `assets/${ie.newFileName}`;
    }
    state.pendingImageSwap = null;
    renderEditor();
    renderSections();
    updateChangeCount();
    // After swap: focus and highlight the alt text input so user reviews the caption
    setTimeout(function() {
      var altInput = document.querySelector('input[data-section="' + sectionId + '"][data-element="' + elementId + '"][data-type="alt"]');
      if (altInput) {
        altInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
        altInput.focus();
        altInput.select();
        altInput.style.outline = '2px solid #e67e22';
        altInput.style.background = '#fef9e7';
        altInput.addEventListener('blur', function handler() {
          altInput.style.outline = '';
          altInput.style.background = '';
          altInput.removeEventListener('blur', handler);
        });
      }
    }, 100);
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

function resetElement(sectionId, elementId, type) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  if (type === 'text') {
    const te = section.textElements.find(t => t.id === elementId);
    if (te) {
      te.content = te.originalContent;
      te.fontSize = te.originalFontSize;
      te.fontFamily = te.originalFontFamily;
      te.fontColor = te.originalFontColor;
      te.spacingBelow = te.originalSpacingBelow;
    }
  } else {
    const ie = section.imageElements.find(i => i.id === elementId);
    if (ie) {
      ie.src = ie.originalSrc;
      ie.alt = ie.originalAlt;
      ie.imageScale = ie.originalImageScale;
          ie.alignment = ie.originalAlignment;
          ie.verticalOffset = ie.originalVerticalOffset;
      ie.spacingBelow = ie.originalSpacingBelow;
      ie.newFileBase64 = null;
      ie.newFileName = null;
      // Reset caption fields and restore alt-link state
      if (ie.captionSupported) {
        ie.captionText = ie.originalCaptionText;
        ie.captionFontSize = ie.originalCaptionFontSize;
        ie.captionFontColor = ie.originalCaptionFontColor;
        ie.captionFontFamily = ie.originalCaptionFontFamily;
        ie.captionSpacingBelow = ie.originalCaptionSpacingBelow;
        ie.altLinked = (ie.originalAlt === ie.originalCaptionText || ie.originalCaptionText === '');
        // Restore the visible caption in the live preview
        postToPreview({ type: 'updateCaption', selector: ie.selector, value: ie.captionText, captionTag: ie.captionTag, captionClass: ie.captionClass });
      }
    }
  }
  renderEditor();
  renderSections();
  updateChangeCount();
}

function updateChangeCount() {
  let total = 0;
  state.sections.forEach(s => { total += countSectionChanges(s); });
  const el = document.getElementById('changeCount');
  const btn = document.getElementById('deployBtn');
  const applyBtn = document.getElementById('applyBtn');
  if (total === 0) {
    el.innerHTML = 'No changes';
    btn.disabled = true;
    btn.className = 'deploy-btn';
    applyBtn.disabled = true;
    applyBtn.className = 'apply-btn';
  } else {
    el.innerHTML = `<strong>${total}</strong> pending change${total !== 1 ? 's' : ''}`;
    btn.disabled = false;
    btn.className = 'deploy-btn';
    applyBtn.disabled = false;
    applyBtn.className = 'apply-btn';
  }
}

// ==========================================
// APPLY (preview only, no deploy)
// ==========================================
// ==========================================
// SECTION RENAME
// ==========================================
function startSectionRename(event, sectionId) {
  event.stopPropagation();
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;

  const nameDiv = event.target;
  const currentName = section.name;
  const input = document.createElement('input');
  input.className = 'name-input';
  input.value = currentName;
  input.onclick = (e) => e.stopPropagation();

  function commitRename() {
    const newName = input.value.trim();
    if (newName && newName !== currentName) {
      applySectionRename(sectionId, newName);
    }
    renderSections();
    renderEditor();
  }

  input.onblur = commitRename;
  input.onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = currentName; input.blur(); }
  };

  nameDiv.replaceWith(input);
  input.focus();
  input.select();
}

function startSectionRenamePanel(sectionId) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;

  const display = document.getElementById('section-name-display-' + sectionId);
  if (!display) return;

  const parent = display.closest('.section-name-edit');
  const currentName = section.name;
  const input = document.createElement('input');
  input.className = 'name-input';
  input.value = currentName;
  input.style.fontSize = '16px';
  input.style.fontWeight = 'bold';
  input.style.width = '100%';

  function commitRename() {
    const newName = input.value.trim();
    if (newName && newName !== currentName) {
      applySectionRename(sectionId, newName);
    }
    renderSections();
    renderEditor();
  }

  input.onblur = commitRename;
  input.onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = currentName; input.blur(); }
  };

  parent.innerHTML = '';
  parent.appendChild(input);
  parent.onclick = null;
  input.focus();
  input.select();
}

function applySectionRename(sectionId, newName) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  pushUndo('rename section');

  section.name = newName;

  // Also update the linked text element so the heading changes in the HTML
  if (section.nameElementId) {
    const te = section.textElements.find(t => t.id === section.nameElementId);
    if (te) {
      te.content = newName;
      te.innerHTML = escapeHtml(newName);
    }
  }

  updateChangeCount();
}

// Reorder images in DOM to match the editor array order
function reorderSectionImages(doc, section) {
  try {
    const sectionEl = doc.querySelector(section.outerSelector);
    if (!sectionEl) return;
    const visibleImages = section.imageElements.filter(ie => !ie.deleted && !ie.isBgImage);
    if (visibleImages.length < 2) return;
    
    // Check if order actually changed
    let orderChanged = false;
    const origOrder = visibleImages.map(ie => ie.originalIndex !== undefined ? ie.originalIndex : -1);
    for (let i = 1; i < origOrder.length; i++) {
      if (origOrder[i] < origOrder[i-1]) { orderChanged = true; break; }
    }
    if (!orderChanged) return;
    
    // Find the DOM wrappers in current order
    const wrappers = [];
    visibleImages.forEach(ie => {
      const el = doc.querySelector(ie.selector);
      if (!el) return;
      const wrapper = el.closest('.strip-item') || el.parentElement;
      if (wrapper) wrappers.push(wrapper);
    });
    
    if (wrappers.length < 2) return;
    
    // Get the parent and reference point
    const parent = wrappers[0].parentElement;
    if (!parent) return;
    
    // Reorder: append each wrapper in the desired order (this moves them)
    wrappers.forEach(w => parent.appendChild(w));
    console.log('[Reorder] Reordered', wrappers.length, 'images in section:', section.name);
  } catch(e) {
    console.warn('Reorder failed:', section.name, e);
  }
}


function findImageBySrc(doc, src, sectionSelector) {
  // Find image by its original src attribute within the section
  try {
    const sectionEl = sectionSelector ? doc.querySelector(sectionSelector) : doc;
    if (!sectionEl) return null;
    const imgs = sectionEl.querySelectorAll('img');
    const srcFile = src.split('/').pop();
    for (const img of imgs) {
      const imgSrc = (img.getAttribute('src') || '').split('/').pop();
      if (imgSrc === srcFile) return img;
    }
  } catch(e) { console.warn('findImageBySrc failed:', e); }
  return null;
}

// Shared caption writer for Apply + Deploy DOM rebuilds.
// Creates, updates, or removes the visible caption element for an image,
// matching ie.captionText. Keeps live preview / Apply / Deploy in sync.
function applyCaptionToDom(imgEl, ie) {
  try {
    if (!imgEl || !ie.captionSupported) return;
    const doc = imgEl.ownerDocument;
    const wrap = imgEl.closest('.award-item') || imgEl.closest('.strip-item') || imgEl.parentElement;
    if (!wrap) return;
    let cap = wrap.querySelector('.award-label, .caption, [class*="caption"], [class*="label"], figcaption');
    const val = ie.captionText || '';
    if (val === '') {
      if (cap) cap.remove();
      return;
    }
    if (!cap) {
      cap = doc.createElement(ie.captionTag || 'p');
      if (ie.captionClass) cap.className = ie.captionClass;
      wrap.appendChild(cap);
    }
    if (val.indexOf('\n') !== -1) {
      cap.innerHTML = val.replace(/\n/g, '<br>');
    } else {
      cap.textContent = val;
    }
  } catch (e) { console.warn('applyCaptionToDom failed:', e); }
}

function applyChanges() {
  const btn = document.getElementById('applyBtn');
  btn.disabled = true;
  btn.textContent = 'Applying...';

  try {
    // Build modified HTML (same as deploy but no push)
    let html = state.originalHtml;
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    state.sections.forEach(section => {
      // Handle deleted sections
      if (section.deleted) {
        try {
          const sEl = doc.querySelector(section.outerSelector);
          if (sEl) sEl.remove();
        } catch(e) { console.warn('Section delete failed:', e); }
        return;
      }

      // Apply spacing
      try {
        const sEl = doc.querySelector(section.outerSelector);
        if (sEl) {
          if (section.paddingTop !== section.originalPaddingTop)
            sEl.style.paddingTop = section.paddingTop + 'px';
          if (section.paddingBottom !== section.originalPaddingBottom)
            sEl.style.paddingBottom = section.paddingBottom + 'px';
          if (section.elementGap !== section.originalElementGap)
            sEl.style.gap = section.elementGap + 'px';
        }
      } catch(e) { console.warn('Spacing apply failed:', e); }

      section.textElements.forEach(te => {
        if (te.content !== te.originalContent) {
          try {
            const el = doc.querySelector(te.selector);
            if (el) {
              if (te.content.indexOf('\n') !== -1) {
                el.innerHTML = te.content.replace(/\n/g, '<br>');
              } else {
                const walker = doc.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
                const textNodes = [];
                let node;
                while (node = walker.nextNode()) textNodes.push(node);
                if (textNodes.length === 1) {
                  textNodes[0].textContent = te.content;
                } else {
                  el.textContent = te.content;
                }
              }
            }
          } catch (e) { console.warn('Selector failed:', te.selector, e); }
        }
        if (te.fontSize !== te.originalFontSize) {
          try {
            const el = doc.querySelector(te.selector);
            if (el) el.style.fontSize = te.fontSize + 'px';
          } catch (e) { console.warn('Font size apply failed:', te.selector, e); }
        }
        if (te.fontColor !== te.originalFontColor) {
          try {
            const el = doc.querySelector(te.selector);
            if (el) el.style.color = te.fontColor;
          } catch (e) { console.warn('Font color apply failed:', te.selector, e); }
        }
        if (te.fontFamily !== te.originalFontFamily) {
          try {
            const el = doc.querySelector(te.selector);
            if (el) el.style.fontFamily = te.fontFamily;
          } catch (e) { console.warn('Font family apply failed:', te.selector, e); }
        }
        if (te.spacingBelow !== te.originalSpacingBelow) {
          try {
            const el = doc.querySelector(te.selector);
            if (el) el.style.marginBottom = te.spacingBelow + 'px';
          } catch (e) { console.warn('Spacing apply failed:', te.selector, e); }
        }
      });

      // Apply image scale changes
      section.imageElements.forEach(ie => {
        if (!ie.deleted && ie.imageScale !== ie.originalImageScale) {
          try {
            const el = ie.isBgImage ? doc.querySelector(ie.selector) : findImageBySrc(doc, ie.originalSrc, section.outerSelector);
            if (el) {
              if (ie.isBgImage) {
                el.style.backgroundSize = ie.imageScale + '%';
              } else {
                el.style.width = ie.imageScale + '%';
                el.style.height = 'auto';
              }
            }
          } catch (e) { console.warn('Image scale apply failed:', ie.selector, e); }
        }
        if (!ie.deleted && ie.alignment !== ie.originalAlignment) {
          try {
            const el = ie.isBgImage ? doc.querySelector(ie.selector) : findImageBySrc(doc, ie.originalSrc, section.outerSelector);
            if (el) {
              if (ie.isBgImage) {
                el.style.backgroundPosition = ie.alignment + ' center';
              } else {
                const imgParent = el.parentElement;
                if (imgParent) imgParent.style.textAlign = ie.alignment;
                if (ie.alignment === 'center') {
                  el.style.display = 'block';
                  el.style.marginLeft = 'auto';
                  el.style.marginRight = 'auto';
                } else if (ie.alignment === 'left') {
                  el.style.marginLeft = '0';
                  el.style.marginRight = 'auto';
                } else {
                  el.style.marginLeft = 'auto';
                  el.style.marginRight = '0';
                }
              }
            }
          } catch (e) { console.warn('Image alignment apply failed:', ie.selector, e); }
        }
        if (!ie.deleted && ie.verticalOffset !== ie.originalVerticalOffset) {
          try {
            const el = ie.isBgImage ? doc.querySelector(ie.selector) : findImageBySrc(doc, ie.originalSrc, section.outerSelector);
            if (el) {
              el.style.marginTop = ie.verticalOffset + 'px';
            }
          } catch (e) { console.warn('Image offset apply failed:', ie.selector, e); }
        }
        if (ie.spacingBelow !== ie.originalSpacingBelow) {
          try {
            const el = ie.isBgImage ? doc.querySelector(ie.selector) : findImageBySrc(doc, ie.originalSrc, section.outerSelector);
            if (el) {
              const target = el.closest('.strip-item') || el.parentElement || el;
              target.style.marginBottom = ie.spacingBelow + 'px';
            }
          } catch (e) { console.warn('Image spacing apply failed:', ie.selector, e); }
        }
      });

      section.imageElements.forEach(ie => {
        try {
          const el = ie.isBgImage ? doc.querySelector(ie.selector) : findImageBySrc(doc, ie.originalSrc, section.outerSelector);
          if (!el) return;
          if (ie.deleted) {
            // Remove parent wrapper (strip-item), not just the img
            if (!ie.isBgImage) {
              var wrapper = el.closest('.strip-item') || el.closest('div');
              var sectionEl = doc.querySelector(section.outerSelector);
              if (wrapper && wrapper !== doc.body && wrapper !== sectionEl) {
                wrapper.remove();
              } else {
                el.remove();
              }
            } else {
              el.remove();
            }
            return;
          }
          const captionChanged = ie.captionSupported && ie.captionText !== ie.originalCaptionText;
          if (ie.src === ie.originalSrc && ie.alt === ie.originalAlt && ie.imageScale === ie.originalImageScale && ie.spacingBelow === ie.originalSpacingBelow && !captionChanged) return;
          if (ie.isBgImage) {
            const style = el.getAttribute('style') || '';
            const previewSrc = ie.newFileBase64 ? 'data:image/jpeg;base64,' + ie.newFileBase64 : ie.src;
            el.setAttribute('style', style.replace(/url\(['\"']?[^'\"\)\s]+['\"']?\)/, `url('${previewSrc}')`));
          } else {
            if (ie.src !== ie.originalSrc) {
              const previewSrc = ie.newFileBase64 ? 'data:image/jpeg;base64,' + ie.newFileBase64 : ie.src;
              el.setAttribute('src', previewSrc);
            }
            if (ie.alt !== ie.originalAlt) {
              el.setAttribute('alt', ie.alt);
            }
            // Caption parity: create/update/remove the visible caption element.
            if (captionChanged) {
              applyCaptionToDom(el, ie);
            }
          }
        } catch (e) { console.warn('Selector failed:', ie.selector, e); }
      });
    });

    // Reorder images to match editor order
    state.sections.forEach(section => {
      reorderSectionImages(doc, section);
    });

    // Add media with base64 data URLs for preview
    state.sections.forEach(section => {
      if (!section.addedMedia || section.addedMedia.length === 0) return;
      try {
        const sectionEl = doc.querySelector(section.outerSelector);
        if (!sectionEl) return;

        // Remove any existing added-media div (from a previous Apply)
        const existing = sectionEl.querySelector('.added-media');
        if (existing) existing.remove();

        const container = doc.createElement('div');
        container.className = 'added-media';
        container.setAttribute('style', 'display:flex;flex-wrap:wrap;gap:1rem;margin-top:2rem;');

        // Group addedMedia by insertion point
        const afterImageMedia = {};
        const appendMedia = [];
        section.addedMedia.forEach(am => {
          if (am.insertAfterImageId) {
            if (!afterImageMedia[am.insertAfterImageId]) afterImageMedia[am.insertAfterImageId] = [];
            afterImageMedia[am.insertAfterImageId].push(am);
          } else {
            appendMedia.push(am);
          }
        });

        // Insert media after specific images
        Object.keys(afterImageMedia).forEach(imgId => {
          const ie = section.imageElements.find(i => i.id === imgId);
          if (!ie) return;
          // Find the image element in the DOM by src
          const imgs = sectionEl.querySelectorAll('img');
          let targetImg = null;
          for (const img of imgs) {
            if (img.getAttribute('src') && img.getAttribute('src').includes(ie.src.split('/').pop())) {
              targetImg = img;
              break;
            }
          }
          if (targetImg) {
            const insertAfterEl = targetImg.closest('.strip-item') || targetImg.closest('div') || targetImg;
            afterImageMedia[imgId].forEach(am => {
              // Clone sibling structure so new image matches the gallery layout
              const wrapper = insertAfterEl.cloneNode(false);
              wrapper.removeAttribute('id');
              const img = doc.createElement('img');
              img.setAttribute('src', am.base64 ? 'data:image/jpeg;base64,' + am.base64 : 'assets/' + am.fileName);
              img.setAttribute('alt', am.alt || '');
              wrapper.appendChild(img);
              // Clone caption structure if sibling has one
              const origCaption = insertAfterEl.querySelector('.caption, [class*="caption"], figcaption');
              if (origCaption) {
                const cap = origCaption.cloneNode(false);
                cap.textContent = am.alt || '';
                wrapper.appendChild(cap);
              }
              if (insertAfterEl.nextSibling) {
                insertAfterEl.parentNode.insertBefore(wrapper, insertAfterEl.nextSibling);
              } else {
                insertAfterEl.parentNode.appendChild(wrapper);
              }
            });
          }
        });

        // Append remaining media at end
        if (appendMedia.length > 0) {
          // Find a gallery item to clone structure from
          const galleryItems = sectionEl.querySelectorAll('img');
          const templateEl = galleryItems.length > 0 ? (galleryItems[0].closest('div[class]') || galleryItems[0].parentElement) : null;
          appendMedia.forEach(am => {
            let wrapper;
            if (templateEl) {
              wrapper = templateEl.cloneNode(false);
              wrapper.removeAttribute('id');
            } else {
              wrapper = doc.createElement('div');
            }
            const img = doc.createElement('img');
            img.setAttribute('src', am.base64 ? 'data:image/jpeg;base64,' + am.base64 : 'assets/' + am.fileName);
            img.setAttribute('alt', am.alt || '');
            wrapper.appendChild(img);
            if (templateEl) {
              const origCaption = templateEl.querySelector('.caption, [class*="caption"], figcaption');
              if (origCaption) {
                const cap = origCaption.cloneNode(false);
                cap.textContent = am.alt || '';
                wrapper.appendChild(cap);
              }
              // Insert into the same parent as existing gallery items
              templateEl.parentNode.appendChild(wrapper);
            } else {
              container.appendChild(wrapper);
            }
          });
          if (!templateEl) sectionEl.appendChild(container);
        }
      } catch (e) { console.warn('Failed to add media to section:', section.id, e); }
    });

    // Serialize and load into blob preview
    const previewHtml = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
    loadBlobPreview(previewHtml);

    btn.textContent = 'Applied!';
    btn.className = 'apply-btn success';
    renderEditor();
    renderSections();
    setTimeout(() => {
      btn.textContent = 'Apply';
      btn.className = 'apply-btn';
      updateChangeCount();
    }, 2000);

  } catch (err) {
    console.error('Apply failed:', err);
    btn.textContent = 'Apply';
    btn.className = 'apply-btn';
    updateChangeCount();
  }
}

// ==========================================
// DEPLOY
// ==========================================
async function deploySite() {
  const btn = document.getElementById('deployBtn');
  btn.disabled = true;
  btn.textContent = 'Deploying...';

  showLoading('Applying changes...');

  try {
    // Build deploy summary for diagnostics
    let deployLog = { text: 0, fontSize: 0, fontColor: 0, fontFamily: 0, imageScale: 0, spacing: 0, images: 0, selectorFails: 0 };

    // Apply text changes to HTML
    let html = state.originalHtml;
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    state.sections.forEach(section => {
      // Handle deleted sections
      if (section.deleted) {
        try {
          const sEl = doc.querySelector(section.outerSelector);
          if (sEl) sEl.remove();
        } catch(e) { console.warn("Section delete failed:", e); }
        return;
      }

      // Apply spacing
      try {
        const sEl = doc.querySelector(section.outerSelector);
        if (sEl) {
          if (section.paddingTop !== section.originalPaddingTop) {
            sEl.style.paddingTop = section.paddingTop + 'px';
            deployLog.spacing++;
          }
          if (section.paddingBottom !== section.originalPaddingBottom) {
            sEl.style.paddingBottom = section.paddingBottom + 'px';
            deployLog.spacing++;
          }
          if (section.elementGap !== section.originalElementGap) {
            sEl.style.gap = section.elementGap + 'px';
            deployLog.spacing++;
          }
        }
      } catch(e) { console.warn('Spacing deploy failed:', e); }

      section.textElements.forEach(te => {
        if (te.content !== te.originalContent) {
          try {
            const el = doc.querySelector(te.selector);
            if (el) {
              if (te.content.indexOf("\n") !== -1) {
                el.innerHTML = te.content.replace(/\n/g, "<br>");
              } else {
                // Walk text nodes to preserve child element structure
                const walker = doc.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
                const textNodes = [];
                let node;
                while (node = walker.nextNode()) textNodes.push(node);
                if (textNodes.length === 1) {
                  textNodes[0].textContent = te.content;
                } else {
                  el.textContent = te.content;
                }
              }
            }
          } catch (e) {
            console.warn('Selector failed:', te.selector, e);
            deployLog.selectorFails++;
          }
        }
        if (te.fontSize !== te.originalFontSize) {
          try {
            const el = doc.querySelector(te.selector);
            if (el) { el.style.fontSize = te.fontSize + 'px'; deployLog.fontSize++; }
          } catch (e) { console.warn('Font size deploy failed:', te.selector, e); }
        }
        if (te.fontColor !== te.originalFontColor) {
          try {
            const el = doc.querySelector(te.selector);
            if (el) { el.style.color = te.fontColor; deployLog.fontColor++; }
          } catch (e) { console.warn('Font color deploy failed:', te.selector, e); }
        }
        if (te.fontFamily !== te.originalFontFamily) {
          try {
            const el = doc.querySelector(te.selector);
            if (el) { el.style.fontFamily = te.fontFamily; deployLog.fontFamily++; }
          } catch (e) { console.warn('Font family deploy failed:', te.selector, e); }
        }
        if (te.spacingBelow !== te.originalSpacingBelow) {
          try {
            const el = doc.querySelector(te.selector);
            if (el) { el.style.marginBottom = te.spacingBelow + 'px'; deployLog.spacing = (deployLog.spacing || 0) + 1; }
          } catch (e) { console.warn('Spacing deploy failed:', te.selector, e); }
        }
      });

      section.imageElements.forEach(ie => {
        try {
          const el = ie.isBgImage ? doc.querySelector(ie.selector) : findImageBySrc(doc, ie.originalSrc, section.outerSelector);
          if (!el) return;
          if (ie.deleted) {
            // Remove parent wrapper (strip-item), not just the img
            if (!ie.isBgImage) {
              var wrapper = el.closest('.strip-item') || el.closest('div');
              var sectionEl = doc.querySelector(section.outerSelector);
              if (wrapper && wrapper !== doc.body && wrapper !== sectionEl) {
                wrapper.remove();
              } else {
                el.remove();
              }
            } else {
              el.remove();
            }
            return;
          }
          const captionChangedDep = ie.captionSupported && ie.captionText !== ie.originalCaptionText;
          if (ie.src === ie.originalSrc && ie.alt === ie.originalAlt && ie.imageScale === ie.originalImageScale && ie.spacingBelow === ie.originalSpacingBelow && !captionChangedDep) return;
          if (ie.isBgImage) {
            const style = el.getAttribute('style') || '';
            el.setAttribute('style', style.replace(/url\(['\"']?[^'\"\)\s]+['\"']?\)/, `url('${ie.src}')`));
          } else {
            if (ie.src !== ie.originalSrc) el.setAttribute('src', ie.src);
            if (ie.alt !== ie.originalAlt) {
              el.setAttribute('alt', ie.alt);
            }
            // Caption parity: create/update/remove the visible caption element.
            if (captionChangedDep) {
              applyCaptionToDom(el, ie);
            }
          }
          // Deploy image scale change
          if (ie.imageScale !== ie.originalImageScale) {
            if (ie.isBgImage) {
              el.style.backgroundSize = ie.imageScale + '%';
            } else {
              el.style.width = ie.imageScale + '%';
              el.style.height = 'auto';
            }
            deployLog.imageScale++;
            console.log('[Deploy] Image scale changed:', ie.selector || ie.originalSrc, '→', ie.imageScale + '%');
          }
          // Deploy alignment change
          if (ie.alignment !== ie.originalAlignment) {
            if (ie.isBgImage) {
              el.style.backgroundPosition = ie.alignment + ' center';
            } else {
              const imgParent = el.parentElement;
              if (imgParent) imgParent.style.textAlign = ie.alignment;
              if (ie.alignment === 'center') {
                el.style.display = 'block';
                el.style.marginLeft = 'auto';
                el.style.marginRight = 'auto';
              } else if (ie.alignment === 'left') {
                el.style.marginLeft = '0';
                el.style.marginRight = 'auto';
              } else {
                el.style.marginLeft = 'auto';
                el.style.marginRight = '0';
              }
            }
            console.log('[Deploy] Image alignment changed:', ie.selector || ie.originalSrc, '→', ie.alignment);
          }
          // Deploy vertical offset change
          if (ie.verticalOffset !== ie.originalVerticalOffset) {
            el.style.marginTop = ie.verticalOffset + 'px';
            console.log('[Deploy] Image vertical offset:', ie.selector || ie.originalSrc, '→', ie.verticalOffset + 'px');
          }
          if (ie.spacingBelow !== ie.originalSpacingBelow) {
            const target = el.closest('.strip-item') || el.parentElement || el;
            target.style.marginBottom = ie.spacingBelow + 'px';
            deployLog.spacing = (deployLog.spacing || 0) + 1;
            console.log('[Deploy] Image spacing changed:', ie.selector || ie.originalSrc, '→', ie.spacingBelow + 'px');
          }
        } catch (e) {
          console.warn('Selector failed:', ie.selector, e);
        }
      });
    });

    // Reorder images to match editor order
    state.sections.forEach(section => {
      reorderSectionImages(doc, section);
    });

    // Add media to sections
    state.sections.forEach(section => {
      if (!section.addedMedia || section.addedMedia.length === 0) return;
      try {
        const sectionEl = doc.querySelector(section.outerSelector);
        if (!sectionEl) return;

        const container = doc.createElement('div');
        container.className = 'added-media';
        container.setAttribute('style', 'display:flex;flex-wrap:wrap;gap:1rem;margin-top:2rem;');

        // Group addedMedia by insertion point
        const afterImageMedia = {};
        const appendMedia = [];
        section.addedMedia.forEach(am => {
          if (am.insertAfterImageId) {
            if (!afterImageMedia[am.insertAfterImageId]) afterImageMedia[am.insertAfterImageId] = [];
            afterImageMedia[am.insertAfterImageId].push(am);
          } else {
            appendMedia.push(am);
          }
        });

        // Insert media after specific images
        Object.keys(afterImageMedia).forEach(imgId => {
          const ie = section.imageElements.find(i => i.id === imgId);
          if (!ie) return;
          const imgs = sectionEl.querySelectorAll('img');
          let targetImg = null;
          for (const img of imgs) {
            if (img.getAttribute('src') && img.getAttribute('src').includes(ie.src.split('/').pop())) {
              targetImg = img;
              break;
            }
          }
          if (targetImg) {
            const insertAfterEl = targetImg.closest('.strip-item') || targetImg.closest('div') || targetImg;
            afterImageMedia[imgId].forEach(am => {
              // Clone sibling structure so new image matches the gallery layout
              const wrapper = insertAfterEl.cloneNode(false);
              wrapper.removeAttribute('id');
              const img = doc.createElement('img');
              img.setAttribute('src', 'assets/' + am.fileName);
              img.setAttribute('alt', am.alt || '');
              wrapper.appendChild(img);
              // Clone caption structure if sibling has one
              const origCaption = insertAfterEl.querySelector('.caption, [class*="caption"], figcaption');
              if (origCaption) {
                const cap = origCaption.cloneNode(false);
                cap.textContent = am.alt || '';
                wrapper.appendChild(cap);
              }
              if (insertAfterEl.nextSibling) {
                insertAfterEl.parentNode.insertBefore(wrapper, insertAfterEl.nextSibling);
              } else {
                insertAfterEl.parentNode.appendChild(wrapper);
              }
            });
          }
        });

        // Append remaining media at end in container
        if (appendMedia.length > 0) {
          // Find a gallery item to clone structure from
          const galleryItems = sectionEl.querySelectorAll('img');
          const templateEl = galleryItems.length > 0 ? (galleryItems[0].closest('div[class]') || galleryItems[0].parentElement) : null;
          appendMedia.forEach(am => {
            let wrapper;
            if (templateEl) {
              wrapper = templateEl.cloneNode(false);
              wrapper.removeAttribute('id');
            } else {
              wrapper = doc.createElement('div');
            }
            const img = doc.createElement('img');
            img.setAttribute('src', 'assets/' + am.fileName);
            img.setAttribute('alt', am.alt || '');
            wrapper.appendChild(img);
            if (templateEl) {
              const origCaption = templateEl.querySelector('.caption, [class*="caption"], figcaption');
              if (origCaption) {
                const cap = origCaption.cloneNode(false);
                cap.textContent = am.alt || '';
                wrapper.appendChild(cap);
              }
              templateEl.parentNode.appendChild(wrapper);
            } else {
              container.appendChild(wrapper);
            }
          });
          if (!templateEl) sectionEl.appendChild(container);
        }
      } catch (e) {
        console.warn('Failed to add media to section:', section.id, e);
      }
    });

    // Clean up old deploy markers before adding new one
    const headNodes = Array.from(doc.head.childNodes);
    headNodes.forEach(node => {
      if (node.nodeType === 8 && node.data && node.data.startsWith('deploy-')) {
        node.remove();
      }
    });
    // Inject deploy marker for live-check polling
    const deployMarker = `deploy-${Date.now()}`;
    const markerComment = doc.createComment(deployMarker);
    doc.head.appendChild(markerComment);

    // Serialize back to HTML string
    // Use the doctype + full html to preserve original structure
    const serializer = new XMLSerializer();
    let newHtml = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;

    // Show deploy summary
    const summary = `Deploying: ${deployLog.text} text, ${deployLog.fontSize} font-size, ${deployLog.fontFamily} font-family, ${deployLog.fontColor} colour, ${deployLog.imageScale} image-scale, ${deployLog.spacing} spacing, ${deployLog.selectorFails} selector fails`;
    console.log('[Deploy]', summary);
    showLoading(summary + ' — pushing...');

    // Push HTML file
    const result = await pushFile(state.filePath, newHtml, 'Update site via Site Editor', state.fileSha);
    state.fileSha = result.content.sha;
    state.originalHtml = newHtml;

    // Push any new image files (swapped)
    const newImages = [];
    state.sections.forEach(s => {
      s.imageElements.forEach(ie => {
        if (ie.newFileBase64) {
          newImages.push(ie);
        }
      });
    });

    // Also collect added media images
    const addedMediaImages = [];
    state.sections.forEach(s => {
      if (s.addedMedia) {
        s.addedMedia.forEach(am => {
          addedMediaImages.push(am);
        });
      }
    });

    const totalImages = newImages.length + addedMediaImages.length;
    let imgIdx = 0;

    for (let i = 0; i < newImages.length; i++) {
      const ie = newImages[i];
      imgIdx++;
      showLoading(`Uploading image ${imgIdx}/${totalImages}...`);
      await pushBinaryFile(`assets/${ie.newFileName}`, ie.newFileBase64, `Add image: ${ie.newFileName}`);
    }

    for (let i = 0; i < addedMediaImages.length; i++) {
      const am = addedMediaImages[i];
      imgIdx++;
      showLoading(`Uploading image ${imgIdx}/${totalImages}...`);
      await pushBinaryFile(`assets/${am.fileName}`, am.base64, `Add media: ${am.fileName}`);
    }

    // Reset change tracking
    state.sections.forEach(s => {
      s.originalName = s.name;
      s.textElements.forEach(te => {
        te.originalContent = te.content;
        te.originalInnerHTML = te.content;
        te.originalFontSize = te.fontSize;
        te.originalFontFamily = te.fontFamily;
        te.originalFontColor = te.fontColor;
        te.originalSpacingBelow = te.spacingBelow;
      });
      // Remove deleted images from state (they've been removed from DOM)
      s.imageElements = s.imageElements.filter(ie => !ie.deleted);
      s.imageElements.forEach(ie => {
        ie.originalImageScale = ie.imageScale;
        ie.originalSrc = ie.src;
        ie.originalAlt = ie.alt;
        ie.originalAlignment = ie.alignment;
        ie.originalVerticalOffset = ie.verticalOffset;
        ie.originalSpacingBelow = ie.spacingBelow;
        ie.newFileBase64 = null;
        ie.newFileName = null;
      });
      s.originalImageOrder = s.imageElements.map(ie => ie.id);
      s.addedMedia = [];
      s.originalPaddingTop = s.paddingTop;
      s.originalPaddingBottom = s.paddingBottom;
      s.originalElementGap = s.elementGap;
    });

    btn.textContent = 'Deployed!';
    btn.className = 'deploy-btn success';
    setTimeout(() => {
      btn.textContent = 'Deploy Changes';
      btn.className = 'deploy-btn';
      updateChangeCount();
    }, 3000);

    // Start polling for live status
    checkLiveStatus(deployMarker);

    // Refresh preview instantly from new HTML
    // Use base64 data in preview so new images show immediately
    // (GitHub Pages hasn't deployed the asset files yet)
    let previewHtml = newHtml;
    addedMediaImages.forEach(am => {
      const escaped = am.fileName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      previewHtml = previewHtml.replace(
        new RegExp('src="assets/' + escaped + '"', 'g'),
        'src="data:image/jpeg;base64,' + am.base64 + '"'
      );
    });
    newImages.forEach(ie => {
      if (ie.newFileBase64 && ie.newFileName) {
        const escaped = ie.newFileName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        previewHtml = previewHtml.replace(
          new RegExp('src="assets/' + escaped + '"', 'g'),
          'src="data:image/jpeg;base64,' + ie.newFileBase64 + '"'
        );
      }
    });
    loadBlobPreview(previewHtml);

    // Re-parse sections from new HTML so added media becomes regular imageElements
    const selectedId = state.selectedSectionId;
    state.sections = parseHtml(newHtml);
    state.selectedSectionId = selectedId;

    renderSections();
    renderEditor();

  } catch (err) {
    btn.textContent = 'Deploy Failed';
    btn.className = 'deploy-btn error';
    alert('Deploy failed: ' + err.message);
    console.error(err);
    setTimeout(() => {
      btn.textContent = 'Deploy Changes';
      btn.className = 'deploy-btn';
      btn.disabled = false;
    }, 3000);
  } finally {
    hideLoading();
  }
}

function showToast(message, duration = 5000) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast show';
  setTimeout(() => {
    toast.className = 'toast fade-out';
    setTimeout(() => { toast.className = 'toast'; }, 300);
  }, duration);
}

async function checkLiveStatus(deployMarker) {
  const liveUrl = getSiteBaseUrl();
  const maxAttempts = 20; // ~60 seconds
  let attempt = 0;

  const poll = async () => {
    attempt++;
    try {
      const resp = await fetch(liveUrl + '?_cb=' + Date.now(), { cache: 'no-store' });
      const text = await resp.text();
      if (text.includes(deployMarker)) {
        showToast('✓ Changes are live!', 5000);
        // Reload iframe from the live site now that GH Pages has deployed
        const iframe = document.getElementById('previewFrame');
        if (iframe) iframe.src = liveUrl + '?_cb=' + Date.now();
        return;
      }
    } catch (e) {
      // Ignore fetch errors, keep polling
    }
    if (attempt < maxAttempts) {
      setTimeout(poll, 3000);
    }
    // Silent timeout — no message needed if it takes too long
  };

  // Start polling after a short initial delay (Pages needs time to build)
  setTimeout(poll, 5000);
}

function backToSetup() {
  show('setup');
}

// ==========================================
// ADD MEDIA
// ==========================================
let addMediaState = {
  insertionIndex: -1, // -1 means append at end
  insertAfterImageId: null, // which existing image this media follows
  targetSectionId: null,
  pendingSmallImages: [], // images awaiting resolution decision
  resolvingIndex: 0
};

function getSizeClass(width) {
  if (width >= 1200) return 'full';
  if (width >= 600) return 'half';
  if (width >= 400) return 'third';
  return 'small';
}

function getLayoutHint(addedMedia) {
  if (!addedMedia || addedMedia.length === 0) return 'None';
  return addedMedia.map(am => `${am.displayWidth || 100}%`).join(' + ');
}


// ==========================================
// REORDER & INSERT POINT HANDLERS
// ==========================================
function moveImageElement(sectionId, elementId, direction) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  pushUndo('reorder image');
  const arr = section.imageElements;
  // Ensure originalIndex is set on first move
  arr.forEach((ie, i) => { if (ie.originalIndex === undefined) ie.originalIndex = i; });
  const idx = arr.findIndex(ie => ie.id === elementId);
  if (idx < 0) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= arr.length) return;
  [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
  renderEditor();
  renderSections();
  updateChangeCount();
}

function moveAddedMedia(sectionId, mediaId, direction) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section || !section.addedMedia) return;
  pushUndo('reorder media');
  const arr = section.addedMedia;
  const idx = arr.findIndex(am => am.id === mediaId);
  if (idx < 0) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= arr.length) return;
  [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
  renderEditor();
  renderSections();
  updateChangeCount();
}

function setAllAddedMediaWidth(sectionId, width) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section || !section.addedMedia) return;
  const w = parseInt(width);
  section.addedMedia.forEach(am => { am.displayWidth = w; });
  renderEditor();
  renderSections();
  updateChangeCount();
}

function startInsertMediaAfterImage(sectionId, imageId) {
  addMediaState.targetSectionId = sectionId;
  addMediaState.insertionIndex = 0; // Will be added at start of addedMedia
  addMediaState.insertAfterImageId = imageId;
  document.getElementById('addMediaChooser').click();
}

function startInsertMedia(sectionId, index) {
  addMediaState.insertAfterImageId = null;
  addMediaState.targetSectionId = sectionId;
  addMediaState.insertionIndex = index;
  document.getElementById('addMediaChooser').click();
}

function startAddMedia(sectionId) {
  addMediaState.targetSectionId = sectionId;
  addMediaState.insertionIndex = -1;
  addMediaState.insertAfterImageId = null;
  document.getElementById('addMediaChooser').click();
}

document.getElementById('addMediaChooser').addEventListener('change', function(e) {
  if (!e.target.files.length || !addMediaState.targetSectionId) return;
  const files = Array.from(e.target.files);
  const sectionId = addMediaState.targetSectionId;
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  pushUndo('add media');
  console.log('[AddMedia] Processing', files.length, 'files for section:', sectionId);

  let processed = 0;
  const toResolve = [];

  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = function(ev) {
      const base64 = ev.target.result.split(',')[1];
      const img = new Image();
      img.onload = function() {
        const w = img.naturalWidth;
        const h = img.naturalHeight;
        const sizeClass = getSizeClass(w);
        // Default display width based on resolution
        const defaultWidth = w >= 1200 ? 100 : w >= 600 ? 50 : w >= 400 ? 33 : 25;
        const mediaItem = {
          id: 'added-' + Date.now() + '-' + Math.random().toString(36).substr(2,5),
          base64: base64,
          fileName: file.name.toLowerCase().replace(/\s+/g, '-'),
          width: w,
          height: h,
          alt: '',
          sizeClass: sizeClass,
          displayWidth: defaultWidth,
          insertAfterImageId: addMediaState.insertAfterImageId || null
        };

        if (sizeClass === 'small') {
          toResolve.push(mediaItem);
        } else {
          if (addMediaState.insertionIndex >= 0 && addMediaState.insertionIndex <= section.addedMedia.length) {
            section.addedMedia.splice(addMediaState.insertionIndex, 0, mediaItem);
            addMediaState.insertionIndex++;
          } else {
            section.addedMedia.push(mediaItem);
          }
        }

        processed++;
        if (processed === files.length) {
          // All files processed
          if (toResolve.length > 0) {
            addMediaState.pendingSmallImages = toResolve;
            addMediaState.resolvingIndex = 0;
            showResWarning(toResolve[0]);
          } else {
            console.log('[AddMedia] All files processed. addedMedia count:', section.addedMedia.length);
            try {
              renderEditor();
              renderSections();
              updateChangeCount();
              showToast(files.length + ' image' + (files.length > 1 ? 's' : '') + ' added to ' + section.name);
              // Scroll editor panel to bottom to show newly added media
              setTimeout(() => {
                const col = document.getElementById('editorCol');
                if (col) {
                  col.scrollTop = col.scrollHeight;
                  console.log('[AddMedia] Scrolled editor panel. scrollHeight:', col.scrollHeight);
                }
              }, 150);
            } catch(err) {
              console.error('[AddMedia] Render error after adding media:', err);
              showToast('Error rendering: ' + err.message);
            }
          }
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  e.target.value = '';
});

function showResWarning(mediaItem) {
  const modal = document.getElementById('resWarningModal');
  const text = document.getElementById('resWarningText');
  text.textContent = `This image is only ${mediaItem.width}px wide. For the best display, we recommend at least 400px wide (ideally 1200px+ for full-width display).`;
  modal.style.display = 'flex';
}

function resModalAction(action) {
  const modal = document.getElementById('resWarningModal');
  const pending = addMediaState.pendingSmallImages;
  const current = pending[addMediaState.resolvingIndex];
  const section = state.sections.find(s => s.id === addMediaState.targetSectionId);

  if (action === 'upload') {
    // Remove this item, re-open file chooser for replacement
    pending.splice(addMediaState.resolvingIndex, 1);
    modal.style.display = 'none';
    // Re-open chooser
    document.getElementById('addMediaChooser').click();
    return;
  }

  if (action === 'grid') {
    // Add at 33% width and prompt for more
    current.displayWidth = 33;
    if (section) {
      if (addMediaState.insertionIndex >= 0 && addMediaState.insertionIndex <= section.addedMedia.length) {
        section.addedMedia.splice(addMediaState.insertionIndex, 0, current);
        addMediaState.insertionIndex++;
      } else {
        section.addedMedia.push(current);
      }
    }
    advanceResModal();
    // After resolving all, open chooser for more
    if (addMediaState.resolvingIndex >= pending.length) {
      renderEditor();
      renderSections();
      updateChangeCount();
      setTimeout(() => {
        document.getElementById('addMediaChooser').click();
      }, 100);
    }
    return;
  }

  if (action === 'anyway') {
    // Add at 25% width with warning
    current.displayWidth = 25;
    if (section) {
      if (addMediaState.insertionIndex >= 0 && addMediaState.insertionIndex <= section.addedMedia.length) {
        section.addedMedia.splice(addMediaState.insertionIndex, 0, current);
        addMediaState.insertionIndex++;
      } else {
        section.addedMedia.push(current);
      }
    }
    advanceResModal();
    return;
  }
}

function advanceResModal() {
  const modal = document.getElementById('resWarningModal');
  const pending = addMediaState.pendingSmallImages;
  addMediaState.resolvingIndex++;

  if (addMediaState.resolvingIndex < pending.length) {
    showResWarning(pending[addMediaState.resolvingIndex]);
  } else {
    modal.style.display = 'none';
    addMediaState.pendingSmallImages = [];
    renderEditor();
    renderSections();
    updateChangeCount();
  }
}

function nudgeColor(sectionId, selector, elementId, direction, btn) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  const te = section.textElements.find(t => t.id === elementId);
  if (!te) return;
  // Parse hex to RGB, nudge toward white or black
  let r = parseInt(te.fontColor.slice(1,3), 16);
  let g = parseInt(te.fontColor.slice(3,5), 16);
  let b = parseInt(te.fontColor.slice(5,7), 16);
  const step = 20;
  if (direction === 'lighter') {
    r = Math.min(255, r + step);
    g = Math.min(255, g + step);
    b = Math.min(255, b + step);
  } else {
    r = Math.max(0, r - step);
    g = Math.max(0, g - step);
    b = Math.max(0, b - step);
  }
  te.fontColor = '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
  updateChangeCount();
  postToPreview({ type: 'updateFontColor', selector, value: te.fontColor });
  // Update the color picker input next to this button
  const colorInput = btn.parentElement.querySelector('input[type="color"]');
  if (colorInput) colorInput.value = te.fontColor;
}

function rgbToHex(color) {
  if (!color) return '#000000';
  // Already hex
  if (color.charAt(0) === '#') {
    if (color.length === 4) {
      return '#' + color[1]+color[1] + color[2]+color[2] + color[3]+color[3];
    }
    return color.length >= 7 ? color.slice(0,7) : color;
  }
  // rgb(r, g, b) or rgba(r, g, b, a)
  const m = color.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
  if (m) {
    return '#' + [m[1],m[2],m[3]].map(v => parseInt(v).toString(16).padStart(2,'0')).join('');
  }
  return '#000000';
}

// Click-to-locate: map a click in the preview back to the matching section +
// editor field, select it, and highlight the field.
function handlePreviewClick(info) {
  try {
    let foundSection = null, foundElId = null, foundType = null;
    const clickedSel = info.selector || '';
    if (info.kind === 'image' && info.src) {
      // 1) Exact selector match (handles the same filename in multiple sections)
      if (clickedSel) {
        for (const s of state.sections) {
          const ie = s.imageElements.find(i => i.selector === clickedSel);
          if (ie) { foundSection = s; foundElId = ie.id; foundType = 'image'; break; }
        }
      }
      // 2) Fallback: match by filename
      if (!foundSection) {
        const file = info.src.split('/').pop().split('?')[0];
        for (const s of state.sections) {
          const ie = s.imageElements.find(i => (i.src || '').split('/').pop().split('?')[0] === file || (i.originalSrc || '').split('/').pop().split('?')[0] === file);
          if (ie) { foundSection = s; foundElId = ie.id; foundType = 'image'; break; }
        }
      }
    } else if (info.kind === 'text' && info.text) {
      const want = info.text.replace(/\s+/g, ' ').trim();
      // 1) Exact selector match against caption elements, then text elements
      if (clickedSel) {
        for (const s of state.sections) {
          const ie = s.imageElements.find(i => i.captionSupported && i.captionSelector === clickedSel);
          if (ie) { foundSection = s; foundElId = ie.id; foundType = 'image'; break; }
        }
        if (!foundSection) {
          for (const s of state.sections) {
            const te = s.textElements.find(t => t.selector === clickedSel);
            if (te) { foundSection = s; foundElId = te.id; foundType = 'text'; break; }
          }
        }
      }
      // 2) Fallback: match by text content (captions first, then text elements)
      if (!foundSection) {
        for (const s of state.sections) {
          const ie = s.imageElements.find(i => i.captionSupported && (i.captionText || '').replace(/\s+/g, ' ').trim() === want);
          if (ie) { foundSection = s; foundElId = ie.id; foundType = 'image'; break; }
        }
      }
      if (!foundSection) {
        for (const s of state.sections) {
          const te = s.textElements.find(t => (t.content || '').replace(/\s+/g, ' ').trim() === want ||
                                              (t.content || '').replace(/\s+/g, ' ').trim().startsWith(want.slice(0, 40)));
          if (te) { foundSection = s; foundElId = te.id; foundType = 'text'; break; }
        }
      }
    }
    if (!foundSection) return;
    // Select the section and render the editor
    if (state.selectedSectionId !== foundSection.id) {
      state.selectedSectionId = foundSection.id;
      renderSections();
      renderEditor();
    }
    if (isMobileView()) mobileGoTo('editor');
    // Scroll the editor to the matching field and flash-highlight it
    setTimeout(function() {
      const sel = '[data-element="' + foundElId + '"]';
      const fields = document.querySelectorAll(sel);
      let target = fields[0];
      // Prefer the caption field for image-caption text clicks
      if (foundType === 'image') {
        const cap = document.querySelector(sel + '[data-type="caption"]');
        if (cap) target = cap;
      }
      const group = target ? (target.closest('.element-group') || target) : null;
      const scrollTo = group || target;
      if (scrollTo && scrollTo.scrollIntoView) scrollTo.scrollIntoView({ behavior: 'smooth', block: 'center' });
      if (group) {
        const prev = group.style.boxShadow;
        group.style.transition = 'box-shadow 0.3s';
        group.style.boxShadow = '0 0 0 2px #4a9eff';
        setTimeout(function() { group.style.boxShadow = prev || ''; }, 1400);
      }
      if (target && target.focus) { try { target.focus(); } catch(e){} }
    }, 60);
  } catch (e) { console.warn('handlePreviewClick failed:', e); }
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
function escapeAttr(str) {
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
// === Column resize drag logic ===
(function() {
  function setupResize(handleId, leftSel, rightSel, useFlexBasis) {
    const handle = document.getElementById(handleId);
    if (!handle) return;
    const body = document.querySelector('.editor-body');
    let dragging = false, startX, startLeftW, startRightW, leftEl, rightEl;

    handle.addEventListener('mousedown', function(e) {
      e.preventDefault();
      leftEl = handle.previousElementSibling;
      rightEl = handle.nextElementSibling;
      startX = e.clientX;
      startLeftW = leftEl.getBoundingClientRect().width;
      startRightW = rightEl.getBoundingClientRect().width;
      dragging = true;
      handle.classList.add('dragging');
      document.body.classList.add('col-resizing');
    });

    document.addEventListener('mousemove', function(e) {
      if (!dragging) return;
      const dx = e.clientX - startX;
      const newLeft = Math.max(120, startLeftW + dx);
      const newRight = Math.max(120, startRightW - dx);
      // Only resize if both columns stay above min
      if (newLeft >= 120 && newRight >= 120) {
        leftEl.style.width = newLeft + 'px';
        leftEl.style.flex = 'none';
        if (rightEl.classList.contains('editor-col')) {
          rightEl.style.flex = '1';
        } else {
          rightEl.style.width = newRight + 'px';
          rightEl.style.flex = 'none';
        }
      }
    });

    document.addEventListener('mouseup', function() {
      if (!dragging) return;
      dragging = false;
      handle.classList.remove('dragging');
      document.body.classList.remove('col-resizing');
    });
  }

  setupResize('resizeHandle1');
  setupResize('resizeHandle2');
})();

  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
