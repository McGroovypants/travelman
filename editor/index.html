<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Editor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1729;
  --surface: #1a2332;
  --surface2: #243044;
  --border: #2d3f56;
  --text: #e8e8e8;
  --text-dim: #8899aa;
  --gold: #d4a853;
  --gold-dim: #b8922e;
  --accent: #4a9eff;
  --danger: #ff5555;
  --success: #44cc66;
  --orange: #ff9933;
  --radius: 8px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* === ACCESS CODE GATE === */
#gate {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  background: var(--bg);
}
.gate-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px 48px;
  text-align: center;
  max-width: 480px;
  width: 92%;
}
.gate-box h1 {
  color: var(--gold);
  font-size: 24px;
  margin-bottom: 8px;
}
.gate-box p {
  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 20px;
}
.gate-url-input {
  width: 100%;
  padding: 0.65rem 1rem;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px;
  color: #fff;
  font-size: 0.85rem;
  outline: none;
  margin-bottom: 0.6rem;
  box-sizing: border-box;
}
.gate-url-input:focus { border-color: var(--gold); }
.gate-url-input.error { border-color: var(--danger); animation: shake 0.3s; }
.gate-label {
  display: block;
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  margin-bottom: 0.3rem;
  text-align: left;
}
.gate-input {
  width: 100%;
  padding: 0.65rem 1rem;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.95rem;
  text-align: left;
  letter-spacing: 0.1em;
  outline: none;
  box-sizing: border-box;
  margin-bottom: 0.6rem;
}
.gate-input:focus { border-color: var(--gold); }
.gate-input.error { border-color: var(--danger); animation: shake 0.3s; }
@keyframes shake {
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}
.gate-btn {
  width: 100%;
  padding: 12px;
  margin-top: 16px;
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.gate-btn:hover { background: var(--gold-dim); }

/* === SETUP SCREEN === */
#setup {
  display: none;
  align-items: center;
  justify-content: center;
  height: 100vh;
}
.setup-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px;
  max-width: 520px;
  width: 90%;
}
.setup-box h2 { color: var(--gold); margin-bottom: 20px; }
.field { margin-bottom: 16px; }
.field label {
  display: block;
  color: var(--text-dim);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.field input {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.field input:focus { border-color: var(--gold); }
.field .hint { color: var(--text-dim); font-size: 11px; margin-top: 4px; }
.setup-btn {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.setup-btn:hover { background: var(--gold-dim); }
.setup-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* === MAIN EDITOR === */
#editor {
  display: none;
  flex-direction: column;
  height: 100vh;
}
.editor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.editor-header h2 { font-size: 16px; color: var(--gold); }
.editor-header .site-name { color: var(--text-dim); font-size: 13px; }

.editor-body { display: flex; flex: 1; overflow: hidden; }

/* Live preview */
.preview-col {
  width: 35%;
  min-width: 200px;
  display: flex;
  flex-direction: column;
}
.preview-col .col-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
}
.col-header h3 { font-size: 13px; font-weight: 600; }

.col-header a {
  color: var(--accent);
  font-size: 12px;
  text-decoration: none;
}
.preview-col iframe {
  flex: 1;
  width: 100%;
  border: none;
  background: #fff;
}

/* Section list */
.sections-col {
  width: 200px;
  min-width: 120px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  background: var(--surface);
}
.sections-col .col-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.section-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
}
.section-card {
  padding: 10px 12px;
  margin-bottom: 4px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.15s;
}
.section-card:hover { background: var(--surface2); }
.section-card.active { background: var(--surface2); border-left: 3px solid var(--gold); }
.section-card .name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.section-card .badge {
  background: var(--orange);
  color: var(--bg);
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 10px;
  margin-left: 8px;
}
.section-card .meta {
  color: var(--text-dim);
  font-size: 11px;
  margin-top: 2px;
}

/* Resize handles */
.resize-handle {
  width: 5px;
  cursor: col-resize;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.15s;
  position: relative;
  z-index: 10;
}
.resize-handle:hover, .resize-handle.dragging {
  background: var(--gold);
}
.resize-handle::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: -3px; right: -3px;
}
body.col-resizing { cursor: col-resize !important; user-select: none !important; }
body.col-resizing iframe { pointer-events: none; }

/* Toast notification */
.toast-container {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10000;
  pointer-events: none;
}
.toast {
  background: var(--surface2);
  border: 1px solid var(--success);
  color: var(--text);
  padding: 12px 24px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  opacity: 0;
  transform: translateY(-10px);
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: auto;
}
.toast.show {
  opacity: 1;
  transform: translateY(0);
}
.toast.fade-out {
  opacity: 0;
  transform: translateY(-10px);
}

/* Editor panel */
.editor-col {
  flex: 1;
  min-width: 200px;
  overflow-y: auto;
  padding: 20px;
  background: var(--bg);
}
.editor-col h3 {
  color: var(--gold);
  font-size: 18px;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.editor-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  font-size: 15px;
}

.element-group {
  margin-bottom: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}
.element-group.changed { border-color: var(--orange); }
.element-group .el-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.element-group .el-tag {
  font-size: 11px;
  text-transform: uppercase;
  color: var(--text-dim);
  letter-spacing: 0.5px;
}
.element-group .el-changed {
  font-size: 10px;
  color: var(--orange);
  font-weight: 600;
}
.element-group textarea,
.element-group input[type="text"] {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  resize: vertical;
  outline: none;
}
.element-group textarea:focus,
.element-group input[type="text"]:focus { border-color: var(--gold); }
.element-group textarea { min-height: 60px; }

.reset-btn {
  margin-top: 6px;
  padding: 4px 10px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  font-size: 11px;
  cursor: pointer;
}
.reset-btn:hover { border-color: var(--text-dim); color: var(--text); }

/* Image elements */
.img-preview {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.img-preview img {
  width: 80px;
  height: 60px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
}
.img-preview .img-info {
  flex: 1;
  font-size: 12px;
  color: var(--text-dim);
  word-break: break-all;
}
.delete-btn {
  background: none;
  border: 1px solid #e74c3c;
  color: #e74c3c;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 4px;
  cursor: pointer;
  margin-left: 6px;
  transition: background 0.2s, color 0.2s;
}
.delete-btn:hover { background: #e74c3c; color: #fff; }
.swap-btn {
  padding: 6px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
}
.swap-btn:hover { border-color: var(--gold); color: var(--gold); }

/* Deploy bar */
.deploy-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
}
.deploy-bar .change-count {
  font-size: 13px;
  color: var(--text-dim);
}
.deploy-bar .change-count strong { color: var(--orange); }
.deploy-btn {
  padding: 8px 24px;
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.deploy-btn:hover { background: var(--gold-dim); }
.deploy-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.deploy-btn.success { background: var(--success); }
.deploy-btn.error { background: var(--danger); }
.apply-btn {
  padding: 8px 24px;
  background: transparent;
  color: var(--gold);
  border: 1px solid var(--gold);
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-right: 8px;
}
.apply-btn:hover { background: rgba(212, 168, 83, 0.15); }
.apply-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.apply-btn.success { border-color: var(--success); color: var(--success); }
.back-btn {
  padding: 8px 16px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
}
.back-btn:hover { border-color: var(--text-dim); color: var(--text); }

/* Loading */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,23,41,0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text-dim); margin-top: 12px; font-size: 14px; }

/* Scrollbars */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* Add Media button */
.add-media-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  background: transparent;
  border: 2px dashed var(--gold);
  border-radius: var(--radius);
  color: var(--gold);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.add-media-btn:hover {
  background: rgba(212,168,83,0.1);
}

/* Added media items in editor */
.added-media-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
}
.added-media-item img {
  width: 72px;
  height: 54px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.added-media-item .ami-details {
  flex: 1;
  min-width: 0;
}
.added-media-item .ami-dims {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.added-media-item .ami-dims .ami-size-class {
  color: var(--gold);
  font-weight: 600;
}
.added-media-item .ami-warning {
  font-size: 11px;
  color: #ff6b6b;
  margin-bottom: 4px;
}
.added-media-item input {
  width: 100%;
  padding: 5px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 12px;
  outline: none;
}
.added-media-item input:focus { border-color: var(--gold); }
.added-media-item select {
  padding: 4px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--gold);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  outline: none;
  margin-bottom: 4px;
}
.added-media-item select:focus { border-color: var(--gold); }
.ami-remove {
  background: none;
  border: none;
  color: var(--danger);
  font-size: 18px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  flex-shrink: 0;
}
.ami-remove:hover { opacity: 0.7; }
.ami-layout-hint {
  font-size: 11px;
  color: var(--gold);
  margin-top: 10px;
  margin-bottom: 4px;
}

/* Resolution warning modal */
.res-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,23,41,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}
.res-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px 32px;
  max-width: 440px;
  width: 90%;
  text-align: center;
}
.res-modal h3 {
  color: #ff6b6b;
  font-size: 16px;
  margin-bottom: 12px;
}
.res-modal p {
  color: var(--text-dim);
  font-size: 13px;
  margin-bottom: 20px;
  line-height: 1.5;
}
.res-modal-buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.res-modal-buttons button {
  padding: 10px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
}
.res-modal-buttons .btn-primary {
  background: var(--gold);
  color: var(--bg);
}
.res-modal-buttons .btn-primary:hover { background: var(--gold-dim); }
.res-modal-buttons .btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}
.res-modal-buttons .btn-secondary:hover { border-color: var(--text-dim); }

/* === SPACING & FONT SIZE CONTROLS === */
.spacing-controls {
  margin-top: 12px;
  padding: 10px;
  background: #1a1a2e;
  border-radius: 6px;
  border: 1px solid #333;
}
.spacing-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #888;
  margin-bottom: 8px;
}
.spacing-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.spacing-row span:first-child {
  width: 80px;
  font-size: 12px;
  color: #aaa;
}
.spacing-row input[type="range"] {
  flex: 1;
  accent-color: #4a6cf7;
}
.spacing-value {
  width: 45px;
  text-align: right;
  font-size: 12px;
  color: #4a6cf7;
  font-family: monospace;
}
.font-size-control {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
}
.font-size-control span {
  font-size: 11px;
  color: #888;
}
.font-size-control select,
.font-size-input {
  background: #1a1a2e;
  color: #fff;
  border: 1px solid #333;
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 12px;
}
.font-size-input {
  width: 55px;
}
.font-color-control {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
}
.font-color-control span {
  font-size: 11px;
  color: #888;
}
.font-color-control input[type="color"] {
  width: 28px;
  height: 24px;
  border: 1px solid #333;
  border-radius: 4px;
  background: #1a1a2e;
  cursor: pointer;
  padding: 0;
}
.font-color-control button {
  background: #1a1a2e;
  color: #ccc;
  border: 1px solid #333;
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 11px;
  cursor: pointer;
}
.font-color-control button:hover {
  background: #2a2a4e;
}
</style>
</head>
<body>

<!-- ACCESS CODE GATE -->
<div id="gate">
  <div class="gate-box">
    <h1>Site Editor</h1>
    <p>Enter the site URL and access code</p>
    <label class="gate-label" for="siteUrlInput">Website URL</label>
    <input type="url" id="siteUrlInput" class="gate-url-input" placeholder="https://yourname.github.io/sitename/" autocomplete="off">
    <label class="gate-label" for="codeInput">Access code</label>
    <input type="password" id="codeInput" class="gate-input" placeholder="••••••••" autocomplete="off">
    <button class="gate-btn" onclick="checkCode()">Enter</button>
  </div>
</div>

<!-- Setup screen removed — PAT is encrypted in the access code -->
<div id="setup" style="display:none;"></div>

<!-- MAIN EDITOR -->
<div id="editor">
  <div class="editor-header">
    <div>
      <h2>Site Editor</h2>
      <span class="site-name" id="siteLabel"></span>
    </div>
  </div>
  <div class="editor-body">
    <div class="preview-col">
      <div class="col-header">
        <h3>Preview</h3>
        <a id="previewLink" href="#" target="_blank">Open site &#8599;</a>
      </div>
      <iframe id="previewFrame" title="Live site preview"></iframe>
    </div>
    <div class="resize-handle" id="resizeHandle1"></div>
    <div class="sections-col">
      <div class="col-header">
        <h3>Sections</h3>
      </div>
      <div class="section-list" id="sectionList"></div>
    </div>
    <div class="resize-handle" id="resizeHandle2"></div>
    <div class="editor-col" id="editorCol">
      <div class="editor-empty">Select a section to edit</div>
    </div>
  </div>
  <div class="deploy-bar">
    <button class="back-btn" onclick="location.reload()">Log Out</button>
    <span class="change-count" id="changeCount">No changes</span>
    <button class="apply-btn" id="applyBtn" onclick="applyChanges()" disabled>Apply</button>
    <button class="deploy-btn" id="deployBtn" onclick="deploySite()" disabled>Deploy Changes</button>
  </div>
</div>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay" style="display:none" class="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Loading...</div>
</div>

<!-- TOAST NOTIFICATION -->
<div class="toast-container" id="toastContainer">
  <div class="toast" id="toast"></div>
</div>

<input type="file" id="fileChooser" accept="image/*" style="display:none">
<input type="file" id="addMediaChooser" accept="image/*" multiple style="display:none">

<!-- Resolution Warning Modal -->
<div id="resWarningModal" class="res-modal-overlay" style="display:none">
  <div class="res-modal">

<script>
// ==========================================
// CONFIG
// ==========================================
// Multi-site credentials: each entry is { hash, encPat }
// hash = sha256(password), encPat = PAT encrypted with that password via PBKDF2+AES-GCM
const SITE_CREDS = [
  { hash: 'f99acf0dc1b902b0ef7437f2c94acaad0f356678055fe1a585336f6c5ab8948f', encPat: 'qGS4sH5RmcdMAAj+x7gBWWsCU5QtHLoMME3ln0ecLYOoTwdH64toabomf75EI4sLetwxDjwSy0Sk1Px1NbB5AcXAmBFxON5UyYLZeKTrq8pZQkCs' },
  { hash: 'ad1454c7b344ab6c524d0164f993e110f18ab9e9b13bd6f96667875fa335f6e9', encPat: 'BciL7noolZpOBKlAubn5GSd1AR+my/AFmFZQulncsSYrx+9Z1fjrdtozWsyrSq59ZXzgutauysD6iIphI2GSUJsUyPFdD+nNMXSYGJt1zv17wyKv' }
];

// Custom domain → GitHub owner/repo mapping
const CUSTOM_DOMAINS = {
  'travelman.nz': { owner: 'McGroovypants', repo: 'travelman' }
};

async function decryptPat(accessCode, encPat) {
  const blob = Uint8Array.from(atob(encPat), c => c.charCodeAt(0));
  const salt = blob.slice(0, 16);
  const iv = blob.slice(16, 28);
  const ciphertext = blob.slice(28);
  const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(accessCode), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
  return new TextDecoder().decode(decrypted);
}

function parseGithubPagesUrl(url) {
  // Handles https://owner.github.io/repo/, custom domains, or bare domain
  try {
    const u = new URL(url.trim());
    // Check custom domains first
    const domainKey = u.hostname.replace(/^www\./, '');
    if (CUSTOM_DOMAINS[domainKey]) return CUSTOM_DOMAINS[domainKey];
    // Standard GitHub Pages URL
    const hostParts = u.hostname.split('.');
    if (hostParts.length < 3 || hostParts[1] !== 'github' || hostParts[2] !== 'io') return null;
    const owner = hostParts[0];
    const repo = u.pathname.replace(/^\/|\/$/g, '');
    return { owner, repo: repo || '' };
  } catch (e) { return null; }
}

// ==========================================
// STATE
// ==========================================
let state = {
  pat: '',
  owner: '',
  repo: '',
  filePath: '',
  originalHtml: '',
  sections: [],
  selectedSectionId: null,
  fileSha: '',
  pendingImageSwap: null // { sectionIdx, elementIdx }
};

// ==========================================
// UTILITIES
// ==========================================
async function sha256(text) {
  const data = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Returns the live site URL, preferring custom domain if one exists
function getSiteBaseUrl() {
  const match = Object.entries(CUSTOM_DOMAINS).find(([domain, info]) =>
    info.owner === state.owner && info.repo === state.repo
  );
  if (match) return `https://${match[0]}/`;
  return `https://${state.owner}.github.io/${state.repo}/`;
}

function show(id) {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('setup').style.display = 'none';
  document.getElementById('editor').style.display = 'none';
  document.getElementById(id).style.display = id === 'editor' ? 'flex' : 'flex';
}

function showLoading(text) {
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingOverlay').style.display = 'flex';
}
function hideLoading() {
  document.getElementById('loadingOverlay').style.display = 'none';
}

// ==========================================
// ACCESS CODE
// ==========================================
document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkCode();
});
document.getElementById('siteUrlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('codeInput').focus();
});

// Auto-detect site URL from current page location
(function() {
  const loc = window.location;
  const domainKey = loc.hostname.replace(/^www\./, '');
  if (CUSTOM_DOMAINS[domainKey]) {
    // Custom domain: site URL is the root domain
    document.getElementById('siteUrlInput').value = `${loc.protocol}//${loc.hostname}/`;
  } else if (loc.hostname.endsWith('.github.io')) {
    const parts = loc.pathname.split('/').filter(Boolean);
    // If we're at /reponame/editor/, the site URL is /reponame/
    if (parts.length >= 1) {
      const siteUrl = `${loc.protocol}//${loc.hostname}/${parts[0]}/`;
      document.getElementById('siteUrlInput').value = siteUrl;
    }
  }
})();

async function checkCode() {
  const urlInput = document.getElementById('siteUrlInput');
  const codeInput = document.getElementById('codeInput');
  const code = codeInput.value;
  const urlVal = urlInput.value.trim();

  // Parse URL
  const parsed = parseGithubPagesUrl(urlVal);
  if (!parsed) {
    urlInput.classList.add('error');
    setTimeout(() => urlInput.classList.remove('error'), 400);
    return;
  }

  // Check password against known hashes
  const hash = await sha256(code);
  const cred = SITE_CREDS.find(c => c.hash === hash);
  if (!cred) {
    codeInput.classList.add('error');
    setTimeout(() => codeInput.classList.remove('error'), 400);
    codeInput.value = '';
    return;
  }

  try {
    const pat = await decryptPat(code, cred.encPat);
    state.pat = pat;
    state.owner = parsed.owner;
    state.repo = parsed.repo;
    state.filePath = 'index.html';
    loadSiteAuto();
  } catch(e) {
    codeInput.classList.add('error');
    setTimeout(() => codeInput.classList.remove('error'), 400);
    codeInput.value = '';
  }
}

// ==========================================
// BLOB PREVIEW — instant local rendering
// ==========================================
let currentBlobUrl = null;

// postMessage listener script injected into every blob preview
const PREVIEW_BRIDGE = `<script>
(function() {
  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d || !d.type) return;
    if (d.type === 'scrollTo') {
      var el = document.querySelector(d.selector);
      if (!el) return;
      var offset = d.offset !== undefined ? d.offset : 80;
      var top = el.getBoundingClientRect().top + window.scrollY - offset;
      window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
      var orig = el.style.outline;
      el.style.outline = '3px solid #3498db';
      setTimeout(function() { el.style.outline = orig; }, 1500);
    } else if (d.type === 'scrollToY') {
      window.scrollTo(0, d.y);
    } else if (d.type === 'updateText') {
      var el = document.querySelector(d.selector);
      if (el) el.textContent = d.value;
    } else if (d.type === 'updateAlt') {
      var el = document.querySelector(d.selector);
      if (el) el.setAttribute('alt', d.value);
    } else if (d.type === 'updateDisplay') {
      var el = document.querySelector(d.selector);
      if (el) el.style.display = d.value;
    } else if (d.type === 'updateFontSize') {
      var el = document.querySelector(d.selector);
      if (el) el.style.fontSize = d.value + 'px';
    } else if (d.type === 'updateFontColor') {
      var el = document.querySelector(d.selector);
      if (el) el.style.color = d.value;
    } else if (d.type === 'updateSpacing') {
      var el = document.querySelector(d.selector);
      if (!el) return;
      el.style.paddingTop = d.paddingTop + 'px';
      el.style.paddingBottom = d.paddingBottom + 'px';
      var disp = window.getComputedStyle(el).display;
      if (disp === 'flex' || disp === 'grid' || disp === 'inline-flex' || disp === 'inline-grid') {
        el.style.gap = d.gap + 'px';
      } else {
        var kids = Array.from(el.children);
        kids.forEach(function(child, i) {
          child.style.marginBottom = (i < kids.length - 1) ? d.gap + 'px' : '';
        });
      }
    }
  });
  // Report scroll position to parent on scroll so parent can restore it
  window.addEventListener('scroll', function() {
    window.parent.postMessage({ type: 'previewScroll', y: window.scrollY }, '*');
  }, { passive: true });
})();
<\/script>`;

function loadBlobPreview(html) {
  if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);

  const baseUrl = getSiteBaseUrl();

  // Inject <base> tag and postMessage bridge
  let processed = html;
  if (processed.includes('<head>')) {
    processed = processed.replace('<head>', `<head><base href="${baseUrl}">`);
  } else if (processed.includes('<HEAD>')) {
    processed = processed.replace('<HEAD>', `<HEAD><base href="${baseUrl}">`);
  }
  // Inject bridge before </body> (or at end)
  if (processed.includes('</body>')) {
    processed = processed.replace('</body>', PREVIEW_BRIDGE + '</body>');
  } else if (processed.includes('</BODY>')) {
    processed = processed.replace('</BODY>', PREVIEW_BRIDGE + '</BODY>');
  } else {
    processed += PREVIEW_BRIDGE;
  }

  const iframe = document.getElementById('previewFrame');
  const blob = new Blob([processed], { type: 'text/html' });
  currentBlobUrl = URL.createObjectURL(blob);

  // Restore scroll position after load using the Y value saved from scroll events
  const savedY = state._previewScrollY || 0;
  iframe.addEventListener('load', function onLoad() {
    iframe.removeEventListener('load', onLoad);
    if (savedY > 10) {
      setTimeout(function() {
        iframe.contentWindow.postMessage({ type: 'scrollToY', y: savedY }, '*');
      }, 150);
    }
  });

  iframe.src = currentBlobUrl;
}

// Track preview scroll position via postMessage from the blob iframe
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'previewScroll') {
    if (state) state._previewScrollY = e.data.y;
  }
});

// ==========================================
// GITHUB API
// ==========================================
async function ghFetch(path, options = {}) {
  const url = `https://api.github.com/repos/${state.owner}/${state.repo}/${path}`;
  const headers = {
    'Authorization': `Bearer ${state.pat}`,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28',
    ...options.headers
  };
  const res = await fetch(url, { ...options, headers });
  if (!res.ok) {
    const body = await res.text();
    throw new Error(`GitHub API ${res.status}: ${body}`);
  }
  return res.json();
}

async function fetchFile(path) {
  const data = await ghFetch(`contents/${path}`);
  const raw = atob(data.content.replace(/\n/g, ''));
  const bytes = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
  const content = new TextDecoder('utf-8').decode(bytes);
  return { content, sha: data.sha };
}

async function pushFile(path, content, message, sha) {
  return ghFetch(`contents/${path}`, {
    method: 'PUT',
    body: JSON.stringify({
      message,
      content: btoa(unescape(encodeURIComponent(content))),
      sha,
      branch: 'main'
    })
  });
}

async function pushBinaryFile(path, base64Content, message) {
  // Check if file exists to get sha
  let sha;
  try {
    const existing = await ghFetch(`contents/${path}`);
    sha = existing.sha;
  } catch (e) {
    sha = undefined;
  }
  const body = { message, content: base64Content, branch: 'main' };
  if (sha) body.sha = sha;
  return ghFetch(`contents/${path}`, {
    method: 'PUT',
    body: JSON.stringify(body)
  });
}

// ==========================================
// HTML PARSER
// ==========================================
function parseHtml(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const sections = [];

  // Find all sections and major containers — body > div catches unlabelled containers like .quote-block
  const candidates = doc.querySelectorAll('section, [id], header, footer, main, nav, article, body > div');
  const seen = new Set();

  candidates.forEach(el => {
    if (seen.has(el)) return;
    seen.add(el);

    const id = el.id || el.className.split(/\s+/)[0] || `section-${sections.length}`;
    const tag = el.tagName.toLowerCase();

    // Get section name from heading or id
    const heading = el.querySelector('h1, h2, h3');
    const name = heading ? heading.textContent.trim().substring(0, 50) :
                 el.id ? el.id.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) :
                 `${tag} ${sections.length + 1}`;

    // Find text elements
    const textElements = [];
    el.querySelectorAll('h1, h2, h3, h4, h5, h6, p, span, a, blockquote, figcaption, cite, em, strong, li, .tagline, .subtitle, .quote-text, .caption, .award-label, .tl-text, .tl-heading, .tl-year, .hook-text, .hero-tagline, .hero-author, .hero-subtitle, .section-label').forEach(textEl => {
      const text = textEl.textContent.replace(/\s+/g, ' ').trim();
      if (!text || text.length < 2) return;
      // Skip if this is just a container for other elements we'll capture
      if (textEl.querySelector('h1, h2, h3, h4, h5, h6, p')) return;

      const elTag = textEl.tagName.toLowerCase();
      const selector = buildSelector(textEl);
      if (!selector) return;

      // Extract font size from inline style or default by tag
      let parsedFontSize = 16;
      const fsMatch = (textEl.getAttribute('style') || '').match(/font-size:\s*(\d+)/);
      if (fsMatch) {
        parsedFontSize = parseInt(fsMatch[1], 10);
      } else {
        const tagDefaults = { h1: 48, h2: 36, h3: 28, h4: 24, h5: 20, h6: 18, p: 16, span: 16, a: 16, li: 16, blockquote: 20, figcaption: 14, cite: 14, em: 16, strong: 16 };
        parsedFontSize = tagDefaults[elTag] || 16;
      }

      // Extract font color from inline style (DOMParser docs can't use getComputedStyle)
      let parsedFontColor = '#ffffff';
      const fcMatch = (textEl.getAttribute('style') || '').match(/(?:^|;)\s*color:\s*([^;]+)/);
      if (fcMatch) {
        parsedFontColor = rgbToHex(fcMatch[1].trim());
      }

      textElements.push({
        id: `txt-${textElements.length}`,
        tag: elTag,
        selector,
        content: text,
        originalContent: text,
        innerHTML: textEl.innerHTML.trim(),
        originalInnerHTML: textEl.innerHTML.trim(),
        fontSize: parsedFontSize,
        originalFontSize: parsedFontSize,
        fontColor: parsedFontColor,
        originalFontColor: parsedFontColor
      });
    });

    // Find image elements
    const imageElements = [];
    el.querySelectorAll('img').forEach(img => {
      const src = img.getAttribute('src') || '';
      const alt = img.getAttribute('alt') || '';
      const selector = buildSelector(img);
      if (!selector) return;

      imageElements.push({
        id: `img-${imageElements.length}`,
        selector,
        src,
        originalSrc: src,
        alt,
        originalAlt: alt,
        newFileBase64: null,
        newFileName: null
      });
    });

    // Also find background images
    el.querySelectorAll('[style*="background"]').forEach(bgEl => {
      const style = bgEl.getAttribute('style') || '';
      const match = style.match(/url\(['"]?([^'")\s]+)['"]?\)/);
      if (!match) return;
      const src = match[1];
      const selector = buildSelector(bgEl);
      if (!selector) return;

      imageElements.push({
        id: `bg-${imageElements.length}`,
        selector,
        src,
        originalSrc: src,
        alt: '',
        originalAlt: '',
        isBgImage: true,
        newFileBase64: null,
        newFileName: null
      });
    });

    if (textElements.length > 0 || imageElements.length > 0) {
      // Extract padding from inline style or default
      let parsedPaddingTop = 40, parsedPaddingBottom = 40, parsedElementGap = 20;
      const elStyle = el.getAttribute('style') || '';
      const ptMatch = elStyle.match(/padding-top:\s*(\d+)/);
      const pbMatch = elStyle.match(/padding-bottom:\s*(\d+)/);
      const gapMatch = elStyle.match(/gap:\s*(\d+)/);
      if (ptMatch) parsedPaddingTop = parseInt(ptMatch[1], 10);
      if (pbMatch) parsedPaddingBottom = parseInt(pbMatch[1], 10);
      if (gapMatch) parsedElementGap = parseInt(gapMatch[1], 10);

      sections.push({
        id,
        name,
        tag,
        textElements,
        imageElements,
        addedMedia: [],
        outerSelector: buildSelector(el),
        paddingTop: parsedPaddingTop,
        paddingBottom: parsedPaddingBottom,
        elementGap: parsedElementGap,
        originalPaddingTop: parsedPaddingTop,
        originalPaddingBottom: parsedPaddingBottom,
        originalElementGap: parsedElementGap
      });
    }
  });

  return sections;
}

function buildSelector(el) {
  if (el.id) return `#${CSS.escape(el.id)}`;

  const path = [];
  let current = el;
  while (current && current !== document.body && current.nodeType === 1) {
    let selector = current.tagName.toLowerCase();
    if (current.id) {
      path.unshift(`#${CSS.escape(current.id)}`);
      break;
    }
    if (current.parentElement) {
      const siblings = Array.from(current.parentElement.children).filter(c => c.tagName === current.tagName);
      if (siblings.length > 1) {
        const idx = siblings.indexOf(current) + 1;
        selector += `:nth-of-type(${idx})`;
      }
    }
    path.unshift(selector);
    current = current.parentElement;
  }
  return path.join(' > ');
}

// ==========================================
// LOAD SITE
// ==========================================
async function loadSite() {
  loadSiteAuto();
}

async function loadSiteAuto() {

  showLoading('Fetching site from GitHub...');

  try {
    const { content, sha } = await fetchFile(state.filePath);
    state.originalHtml = content;
    state.fileSha = sha;

    showLoading('Parsing sections...');
    state.sections = parseHtml(content);
    state.selectedSectionId = state.sections.length > 0 ? state.sections[0].id : null;

    // Setup preview — blob URL for instant rendering
    const siteUrl = getSiteBaseUrl();
    document.getElementById('previewLink').href = siteUrl;
    loadBlobPreview(content);
    document.getElementById('siteLabel').textContent = siteUrl.replace(/^https?:\/\//, '').replace(/\/$/, '');

    renderSections();
    renderEditor();
    updateChangeCount();
    show('editor');
  } catch (err) {
    alert('Failed to load site: ' + err.message);
    console.error(err);
  } finally {
    hideLoading();
  }
}

// ==========================================
// RENDER SECTION LIST
// ==========================================
function renderSections() {
  const list = document.getElementById('sectionList');
  list.innerHTML = '';

  state.sections.forEach(section => {
    const changes = countSectionChanges(section);
    const card = document.createElement('div');
    card.className = `section-card${section.id === state.selectedSectionId ? ' active' : ''}`;
    card.onclick = () => {
      state.selectedSectionId = section.id;
      renderSections();
      renderEditor();
      scrollPreviewToSection(section.id);
    };

    const addedCount = section.addedMedia ? section.addedMedia.length : 0;
    let html = `<div>
      <div class="name">${escapeHtml(section.name)}</div>
      <div class="meta">${section.textElements.length}T ${section.imageElements.length}I${addedCount > 0 ? ' +' + addedCount + 'M' : ''}</div>
    </div>`;
    if (changes > 0) {
      html += `<span class="badge">${changes}</span>`;
    }
    card.innerHTML = html;
    list.appendChild(card);
  });
}

function countSectionChanges(section) {
  let count = 0;
  section.textElements.forEach(te => {
    if (te.content !== te.originalContent) count++;
    if (te.fontSize !== te.originalFontSize) count++;
    if (te.fontColor !== te.originalFontColor) count++;
  });
  section.imageElements.forEach(ie => {
    if (ie.deleted || ie.src !== ie.originalSrc || ie.alt !== ie.originalAlt || ie.newFileBase64) count++;
  });
  if (section.addedMedia && section.addedMedia.length > 0) {
    count += section.addedMedia.length;
  }
  if (section.paddingTop !== section.originalPaddingTop) count++;
  if (section.paddingBottom !== section.originalPaddingBottom) count++;
  if (section.elementGap !== section.originalElementGap) count++;
  return count;
}

// ==========================================
// RENDER EDITOR
// ==========================================
function renderEditor() {
  const col = document.getElementById('editorCol');
  const section = state.sections.find(s => s.id === state.selectedSectionId);

  if (!section) {
    col.innerHTML = '<div class="editor-empty">Select a section to edit</div>';
    return;
  }

  let html = `<h3>${escapeHtml(section.name)}</h3>`;

  // Section spacing controls (top, so always visible on section select)
  html += `<div class="spacing-controls">
    <div class="spacing-label">Section Spacing</div>
    <div class="spacing-row">
      <span>Pad Top</span>
      <input type="range" min="0" max="120" step="4" value="${section.paddingTop}"
        oninput="handlePaddingChange('${section.id}', 'top', this.value)">
      <span class="spacing-value" id="pad-top-val-${section.id}">${section.paddingTop}px</span>
    </div>
    <div class="spacing-row">
      <span>Pad Bottom</span>
      <input type="range" min="0" max="120" step="4" value="${section.paddingBottom}"
        oninput="handlePaddingChange('${section.id}', 'bottom', this.value)">
      <span class="spacing-value" id="pad-bottom-val-${section.id}">${section.paddingBottom}px</span>
    </div>
    <div class="spacing-row">
      <span>Element Gap</span>
      <input type="range" min="0" max="60" step="4" value="${section.elementGap}"
        oninput="handleGapChange('${section.id}', this.value)">
      <span class="spacing-value" id="gap-val-${section.id}">${section.elementGap}px</span>
    </div>
  </div>`;

  // Text elements
  section.textElements.forEach((te, i) => {
    const changed = te.content !== te.originalContent;
    const fontChanged = te.fontSize !== te.originalFontSize;
    const colorChanged = te.fontColor !== te.originalFontColor;
    const anyChange = changed || fontChanged || colorChanged;
    const isLong = te.content.length > 80;
    const fontSizes = [12,14,16,18,20,24,28,32,36,40,48,56,64,72];
    html += `<div class="element-group${anyChange ? ' changed' : ''}">
      <div class="el-label">
        <span class="el-tag">${te.tag}</span>
        ${anyChange ? '<span class="el-changed">Modified</span>' : ''}
      </div>
      ${isLong ?
        `<textarea data-section="${section.id}" data-element="${te.id}" data-type="text"
          oninput="handleTextEdit(this)">${escapeHtml(te.content)}</textarea>` :
        `<input type="text" data-section="${section.id}" data-element="${te.id}" data-type="text"
          oninput="handleTextEdit(this)" value="${escapeAttr(te.content)}">`
      }
      <div class="font-size-control">
        <span>Size</span>
        <select onchange="handleFontSizeChange('${section.id}','${te.selector}','${te.id}',this.value)">
          ${fontSizes.map(sz => '<option value="' + sz + '"' + (te.fontSize === sz ? ' selected' : '') + '>' + sz + 'px</option>').join('')}
        </select>
        <input type="number" min="8" max="120" value="${te.fontSize}" class="font-size-input"
          onchange="handleFontSizeChange('${section.id}','${te.selector}','${te.id}',this.value)">
      </div>
      <div class="font-color-control">
        <span>Colour</span>
        <input type="color" value="${te.fontColor}" onchange="handleFontColorChange('${section.id}','${te.selector}','${te.id}',this.value)">
        <button onclick="nudgeColor('${section.id}','${te.selector}','${te.id}','lighter',this)">Lighter</button>
        <button onclick="nudgeColor('${section.id}','${te.selector}','${te.id}','darker',this)">Darker</button>
      </div>
      ${anyChange ? `<button class="reset-btn" onclick="resetElement('${section.id}','${te.id}','text')">Reset</button>` : ''}
    </div>`;
  });

  // Image elements
  section.imageElements.forEach((ie, i) => {
    const changed = ie.src !== ie.originalSrc || ie.alt !== ie.originalAlt || ie.newFileBase64;
    const imgSrc = ie.newFileBase64 ?
      `data:image/jpeg;base64,${ie.newFileBase64}` :
      resolveImageUrl(ie.src);

    if (ie.deleted) {
      html += `<div class="element-group changed">
        <div class="el-label">
          <span class="el-tag">${ie.isBgImage ? 'background' : 'image'}</span>
          <span class="el-changed" style="color:#e74c3c;">Deleted</span>
        </div>
        <div style="padding:8px 0;color:#888;font-size:12px;">
          <em>${escapeHtml(ie.originalSrc.split('/').pop())}</em> — will be removed on deploy
          <button class="reset-btn" onclick="restoreImage('${section.id}','${ie.id}')">Undo Delete</button>
        </div>
      </div>`;
    } else {
      html += `<div class="element-group${changed ? ' changed' : ''}">
        <div class="el-label">
          <span class="el-tag">${ie.isBgImage ? 'background' : 'image'}</span>
          ${changed ? '<span class="el-changed">Modified</span>' : ''}
        </div>
        <div class="img-preview">
          <img src="${imgSrc}" alt="${escapeAttr(ie.alt)}" onerror="this.style.display='none'">
          <div class="img-info">${escapeHtml(ie.src.split('/').pop())}</div>
          <button class="swap-btn" onclick="startImageSwap('${section.id}','${ie.id}')">Swap</button>
          <button class="delete-btn" onclick="deleteImage('${section.id}','${ie.id}')">Delete</button>
        </div>
        <div style="margin-top:6px;">
          <input type="text" data-section="${section.id}" data-element="${ie.id}" data-type="alt"
            oninput="handleAltEdit(this)" value="${escapeAttr(ie.alt)}" placeholder="Alt text">
        </div>
        ${changed ? `<button class="reset-btn" onclick="resetElement('${section.id}','${ie.id}','image')">Reset</button>` : ''}
      </div>`;
    }
  });

  // Added media items
  if (section.addedMedia && section.addedMedia.length > 0) {
    html += `<div class="element-group changed">
      <div class="el-label">
        <span class="el-tag">Added Media</span>
        <span class="el-changed">${section.addedMedia.length} new</span>
      </div>`;

    section.addedMedia.forEach((am, i) => {
      const dw = am.displayWidth || 100;
      const minPx = Math.round(dw * 12); // rough: 1200px at 100%, 600px at 50%, etc.
      const tooSmall = am.width < minPx;
      html += `<div class="added-media-item">
        <img src="data:image/jpeg;base64,${am.base64}" alt="">
        <div class="ami-details">
          <div class="ami-dims">${am.width} × ${am.height}</div>
          <select onchange="handleAddedMediaWidth('${section.id}','${am.id}',this.value)">
            ${[100,75,66,55,50,33,25].map(w => `<option value="${w}"${w === dw ? ' selected' : ''}>${w}% width</option>`).join('')}
          </select>
          ${tooSmall ? `<div class="ami-warning">⚠ Image may appear soft at ${dw}% — only ${am.width}px wide (recommend ${minPx}px+)</div>` : ''}
          <input type="text" value="${escapeAttr(am.alt)}" placeholder="Alt text"
            oninput="handleAddedMediaAlt('${section.id}','${am.id}',this.value)">
        </div>
        <button class="ami-remove" onclick="removeAddedMedia('${section.id}','${am.id}')" title="Remove">×</button>
      </div>`;
    });

    // Layout hint
    const totalWidth = section.addedMedia.reduce((sum, am) => sum + (am.displayWidth || 100), 0);
    const layoutHint = section.addedMedia.map(am => `${am.displayWidth || 100}%`).join(' + ');
    const wrapNote = totalWidth > 100 ? ' (will wrap to next row)' : '';
    html += `<div class="ami-layout-hint">Layout: ${layoutHint}${wrapNote}</div>`;
    html += `</div>`;
  }

  // Add Media button
  html += `<button class="add-media-btn" onclick="startAddMedia('${section.id}')">+ Add Media</button>`;

  col.innerHTML = html;
}

function resolveImageUrl(src) {
  if (src.startsWith('http')) return src;
  // Resolve relative to site base URL
  return getSiteBaseUrl() + src.replace(/^\.\//, '');
}

// ==========================================
// EVENT HANDLERS
// ==========================================
function handleTextEdit(el) {
  const sectionId = el.dataset.section;
  const elementId = el.dataset.element;
  const value = el.value;
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  const te = section.textElements.find(t => t.id === elementId);
  if (te) {
    te.content = value;
    updatePreviewInstant(te.selector, 'text', value);
  }
  renderSections();
  updateChangeCount();
}

function handleAltEdit(el) {
  const sectionId = el.dataset.section;
  const elementId = el.dataset.element;
  const value = el.value;
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  const ie = section.imageElements.find(i => i.id === elementId);
  if (ie) {
    ie.alt = value;
    updatePreviewInstant(ie.selector, 'alt', value);
  }
  renderSections();
  updateChangeCount();
}

function deleteImage(sectionId, elementId) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  const ie = section.imageElements.find(i => i.id === elementId);
  if (ie) {
    ie.deleted = true;
    // Instantly hide in preview
    updatePreviewInstant(ie.selector, 'delete');
  }
  renderEditor();
  renderSections();
  updateChangeCount();
}

function restoreImage(sectionId, elementId) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  const ie = section.imageElements.find(i => i.id === elementId);
  if (ie) {
    ie.deleted = false;
    // Instantly restore in preview
    updatePreviewInstant(ie.selector, 'restore');
  }
  renderEditor();
  renderSections();
  updateChangeCount();
}

// ==========================================
// INSTANT PREVIEW - via postMessage bridge
// ==========================================
function postToPreview(msg) {
  const iframe = document.getElementById('previewFrame');
  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage(msg, '*');
  }
}

function updatePreviewInstant(selector, type, value) {
  if (type === 'text') {
    postToPreview({ type: 'updateText', selector, value });
  } else if (type === 'alt') {
    postToPreview({ type: 'updateAlt', selector, value });
  } else if (type === 'delete') {
    postToPreview({ type: 'updateDisplay', selector, value: 'none' });
  } else if (type === 'restore') {
    postToPreview({ type: 'updateDisplay', selector, value: '' });
  }
}

function startImageSwap(sectionId, elementId) {
  state.pendingImageSwap = { sectionId, elementId };
  document.getElementById('fileChooser').click();
}

document.getElementById('fileChooser').addEventListener('change', function(e) {
  if (!e.target.files.length || !state.pendingImageSwap) return;
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = function(ev) {
    const base64 = ev.target.result.split(',')[1];
    const { sectionId, elementId } = state.pendingImageSwap;
    const section = state.sections.find(s => s.id === sectionId);
    if (!section) return;
    const ie = section.imageElements.find(i => i.id === elementId);
    if (ie) {
      ie.newFileBase64 = base64;
      ie.newFileName = file.name.toLowerCase().replace(/\s+/g, '-');
      ie.src = `assets/${ie.newFileName}`;
    }
    state.pendingImageSwap = null;
    renderEditor();
    renderSections();
    updateChangeCount();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

function resetElement(sectionId, elementId, type) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  if (type === 'text') {
    const te = section.textElements.find(t => t.id === elementId);
    if (te) {
      te.content = te.originalContent;
      te.fontSize = te.originalFontSize;
      te.fontColor = te.originalFontColor;
    }
  } else {
    const ie = section.imageElements.find(i => i.id === elementId);
    if (ie) {
      ie.src = ie.originalSrc;
      ie.alt = ie.originalAlt;
      ie.newFileBase64 = null;
      ie.newFileName = null;
    }
  }
  renderEditor();
  renderSections();
  updateChangeCount();
}

function updateChangeCount() {
  let total = 0;
  state.sections.forEach(s => { total += countSectionChanges(s); });
  const el = document.getElementById('changeCount');
  const btn = document.getElementById('deployBtn');
  const applyBtn = document.getElementById('applyBtn');
  if (total === 0) {
    el.innerHTML = 'No changes';
    btn.disabled = true;
    btn.className = 'deploy-btn';
    applyBtn.disabled = true;
    applyBtn.className = 'apply-btn';
  } else {
    el.innerHTML = `<strong>${total}</strong> pending change${total !== 1 ? 's' : ''}`;
    btn.disabled = false;
    btn.className = 'deploy-btn';
    applyBtn.disabled = false;
    applyBtn.className = 'apply-btn';
  }
}

// ==========================================
// APPLY (preview only, no deploy)
// ==========================================
function applyChanges() {
  const btn = document.getElementById('applyBtn');
  btn.disabled = true;
  btn.textContent = 'Applying...';

  try {
    // Build modified HTML (same as deploy but no push)
    let html = state.originalHtml;
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    state.sections.forEach(section => {
      // Apply spacing
      try {
        const sEl = doc.querySelector(section.outerSelector);
        if (sEl) {
          if (section.paddingTop !== section.originalPaddingTop)
            sEl.style.paddingTop = section.paddingTop + 'px';
          if (section.paddingBottom !== section.originalPaddingBottom)
            sEl.style.paddingBottom = section.paddingBottom + 'px';
          if (section.elementGap !== section.originalElementGap)
            sEl.style.gap = section.elementGap + 'px';
        }
      } catch(e) { console.warn('Spacing apply failed:', e); }

      section.textElements.forEach(te => {
        if (te.content !== te.originalContent) {
          try {
            const el = doc.querySelector(te.selector);
            if (el) {
              const walker = doc.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
              const textNodes = [];
              let node;
              while (node = walker.nextNode()) textNodes.push(node);
              if (textNodes.length === 1) {
                textNodes[0].textContent = te.content;
              } else {
                el.textContent = te.content;
              }
            }
          } catch (e) { console.warn('Selector failed:', te.selector, e); }
        }
        if (te.fontSize !== te.originalFontSize) {
          try {
            const el = doc.querySelector(te.selector);
            if (el) el.style.fontSize = te.fontSize + 'px';
          } catch (e) { console.warn('Font size apply failed:', te.selector, e); }
        }
        if (te.fontColor !== te.originalFontColor) {
          try {
            const el = doc.querySelector(te.selector);
            if (el) el.style.color = te.fontColor;
          } catch (e) { console.warn('Font color apply failed:', te.selector, e); }
        }
      });

      section.imageElements.forEach(ie => {
        try {
          const el = doc.querySelector(ie.selector);
          if (!el) return;
          if (ie.deleted) { el.remove(); return; }
          if (ie.src === ie.originalSrc && ie.alt === ie.originalAlt) return;
          if (ie.isBgImage) {
            const style = el.getAttribute('style') || '';
            const previewSrc = ie.newFileBase64 ? 'data:image/jpeg;base64,' + ie.newFileBase64 : ie.src;
            el.setAttribute('style', style.replace(/url\(['\"']?[^'\"\)\s]+['\"']?\)/, `url('${previewSrc}')`));
          } else {
            if (ie.src !== ie.originalSrc) {
              const previewSrc = ie.newFileBase64 ? 'data:image/jpeg;base64,' + ie.newFileBase64 : ie.src;
              el.setAttribute('src', previewSrc);
            }
            if (ie.alt !== ie.originalAlt) el.setAttribute('alt', ie.alt);
          }
        } catch (e) { console.warn('Selector failed:', ie.selector, e); }
      });
    });

    // Add media with base64 data URLs for preview
    state.sections.forEach(section => {
      if (!section.addedMedia || section.addedMedia.length === 0) return;
      try {
        const sectionEl = doc.querySelector(section.outerSelector);
        if (!sectionEl) return;

        // Remove any existing added-media div (from a previous Apply)
        const existing = sectionEl.querySelector('.added-media');
        if (existing) existing.remove();

        const container = doc.createElement('div');
        container.className = 'added-media';
        container.setAttribute('style', 'display:flex;flex-wrap:wrap;gap:1rem;margin-top:2rem;');

        section.addedMedia.forEach(am => {
          const dw = am.displayWidth || 100;
          const wrapper = doc.createElement('div');
          if (dw === 100) {
            wrapper.setAttribute('style', 'width:100%;');
          } else {
            wrapper.setAttribute('style', `flex:0 0 calc(${dw}% - 0.5rem);max-width:calc(${dw}% - 0.5rem);`);
          }
          const img = doc.createElement('img');
          // Use base64 for preview since file isn't on GitHub yet
          img.setAttribute('src', am.base64 ? 'data:image/jpeg;base64,' + am.base64 : 'assets/' + am.fileName);
          img.setAttribute('alt', am.alt || '');
          img.setAttribute('style', 'width:100%;border-radius:8px;object-fit:cover;');
          wrapper.appendChild(img);
          container.appendChild(wrapper);
        });

        sectionEl.appendChild(container);
      } catch (e) { console.warn('Failed to add media to section:', section.id, e); }
    });

    // Serialize and load into blob preview
    const previewHtml = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
    loadBlobPreview(previewHtml);

    btn.textContent = 'Applied!';
    btn.className = 'apply-btn success';
    setTimeout(() => {
      btn.textContent = 'Apply';
      btn.className = 'apply-btn';
      updateChangeCount();
    }, 2000);

  } catch (err) {
    console.error('Apply failed:', err);
    btn.textContent = 'Apply';
    btn.className = 'apply-btn';
    updateChangeCount();
  }
}

// ==========================================
// DEPLOY
// ==========================================
async function deploySite() {
  const btn = document.getElementById('deployBtn');
  btn.disabled = true;
  btn.textContent = 'Deploying...';

  showLoading('Applying changes...');

  try {
    // Build deploy summary for diagnostics
    let deployLog = { text: 0, fontSize: 0, fontColor: 0, spacing: 0, images: 0, selectorFails: 0 };

    // Apply text changes to HTML
    let html = state.originalHtml;
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    state.sections.forEach(section => {
      // Apply spacing
      try {
        const sEl = doc.querySelector(section.outerSelector);
        if (sEl) {
          if (section.paddingTop !== section.originalPaddingTop) {
            sEl.style.paddingTop = section.paddingTop + 'px';
            deployLog.spacing++;
          }
          if (section.paddingBottom !== section.originalPaddingBottom) {
            sEl.style.paddingBottom = section.paddingBottom + 'px';
            deployLog.spacing++;
          }
          if (section.elementGap !== section.originalElementGap) {
            sEl.style.gap = section.elementGap + 'px';
            deployLog.spacing++;
          }
        }
      } catch(e) { console.warn('Spacing deploy failed:', e); }

      section.textElements.forEach(te => {
        if (te.content !== te.originalContent) {
          try {
            const el = doc.querySelector(te.selector);
            if (el) {
              // Walk text nodes to preserve child element structure
              const walker = doc.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
              const textNodes = [];
              let node;
              while (node = walker.nextNode()) textNodes.push(node);
              if (textNodes.length === 1) {
                textNodes[0].textContent = te.content;
              } else {
                // Fallback: set textContent (strips children but preserves change)
                el.textContent = te.content;
              }
              deployLog.text++;
              console.log('[Deploy] Text changed:', te.selector, '→', te.content.substring(0, 40));
            } else {
              console.warn('[Deploy] Selector returned null:', te.selector);
              deployLog.selectorFails++;
            }
          } catch (e) {
            console.warn('Selector failed:', te.selector, e);
            deployLog.selectorFails++;
          }
        }
        if (te.fontSize !== te.originalFontSize) {
          try {
            const el = doc.querySelector(te.selector);
            if (el) { el.style.fontSize = te.fontSize + 'px'; deployLog.fontSize++; }
          } catch (e) { console.warn('Font size deploy failed:', te.selector, e); }
        }
        if (te.fontColor !== te.originalFontColor) {
          try {
            const el = doc.querySelector(te.selector);
            if (el) { el.style.color = te.fontColor; deployLog.fontColor++; }
          } catch (e) { console.warn('Font color deploy failed:', te.selector, e); }
        }
      });

      section.imageElements.forEach(ie => {
        try {
          const el = doc.querySelector(ie.selector);
          if (!el) return;
          if (ie.deleted) { el.remove(); return; }
          if (ie.src === ie.originalSrc && ie.alt === ie.originalAlt) return;
          if (ie.isBgImage) {
            const style = el.getAttribute('style') || '';
            el.setAttribute('style', style.replace(/url\(['\"']?[^'\"\)\s]+['\"']?\)/, `url('${ie.src}')`));
          } else {
            if (ie.src !== ie.originalSrc) el.setAttribute('src', ie.src);
            if (ie.alt !== ie.originalAlt) el.setAttribute('alt', ie.alt);
          }
        } catch (e) {
          console.warn('Selector failed:', ie.selector, e);
        }
      });
    });

    // Add media to sections
    state.sections.forEach(section => {
      if (!section.addedMedia || section.addedMedia.length === 0) return;
      try {
        const sectionEl = doc.querySelector(section.outerSelector);
        if (!sectionEl) return;

        const container = doc.createElement('div');
        container.className = 'added-media';
        container.setAttribute('style', 'display:flex;flex-wrap:wrap;gap:1rem;margin-top:2rem;');

        section.addedMedia.forEach(am => {
          const dw = am.displayWidth || 100;
          const wrapper = doc.createElement('div');
          // Subtract gap: use calc to account for flex gap
          if (dw === 100) {
            wrapper.setAttribute('style', 'width:100%;');
          } else {
            wrapper.setAttribute('style', `flex:0 0 calc(${dw}% - 0.5rem);max-width:calc(${dw}% - 0.5rem);`);
          }
          const img = doc.createElement('img');
          img.setAttribute('src', 'assets/' + am.fileName);
          img.setAttribute('alt', am.alt || '');
          img.setAttribute('style', 'width:100%;border-radius:8px;object-fit:cover;');
          wrapper.appendChild(img);
          container.appendChild(wrapper);
        });

        sectionEl.appendChild(container);
      } catch (e) {
        console.warn('Failed to add media to section:', section.id, e);
      }
    });

    // Inject deploy marker for live-check polling
    const deployMarker = `deploy-${Date.now()}`;
    const markerComment = doc.createComment(deployMarker);
    doc.head.appendChild(markerComment);

    // Serialize back to HTML string
    // Use the doctype + full html to preserve original structure
    const serializer = new XMLSerializer();
    let newHtml = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;

    // Show deploy summary
    const summary = `Deploying: ${deployLog.text} text, ${deployLog.fontSize} font-size, ${deployLog.fontColor} colour, ${deployLog.spacing} spacing, ${deployLog.selectorFails} selector fails`;
    console.log('[Deploy]', summary);
    showLoading(summary + ' — pushing...');

    // Push HTML file
    const result = await pushFile(state.filePath, newHtml, 'Update site via Site Editor', state.fileSha);
    state.fileSha = result.content.sha;
    state.originalHtml = newHtml;

    // Push any new image files (swapped)
    const newImages = [];
    state.sections.forEach(s => {
      s.imageElements.forEach(ie => {
        if (ie.newFileBase64) {
          newImages.push(ie);
        }
      });
    });

    // Also collect added media images
    const addedMediaImages = [];
    state.sections.forEach(s => {
      if (s.addedMedia) {
        s.addedMedia.forEach(am => {
          addedMediaImages.push(am);
        });
      }
    });

    const totalImages = newImages.length + addedMediaImages.length;
    let imgIdx = 0;

    for (let i = 0; i < newImages.length; i++) {
      const ie = newImages[i];
      imgIdx++;
      showLoading(`Uploading image ${imgIdx}/${totalImages}...`);
      await pushBinaryFile(`assets/${ie.newFileName}`, ie.newFileBase64, `Add image: ${ie.newFileName}`);
    }

    for (let i = 0; i < addedMediaImages.length; i++) {
      const am = addedMediaImages[i];
      imgIdx++;
      showLoading(`Uploading image ${imgIdx}/${totalImages}...`);
      await pushBinaryFile(`assets/${am.fileName}`, am.base64, `Add media: ${am.fileName}`);
    }

    // Reset change tracking
    state.sections.forEach(s => {
      s.textElements.forEach(te => {
        te.originalContent = te.content;
        te.originalInnerHTML = te.content;
        te.originalFontSize = te.fontSize;
        te.originalFontColor = te.fontColor;
      });
      // Remove deleted images from state (they've been removed from DOM)
      s.imageElements = s.imageElements.filter(ie => !ie.deleted);
      s.imageElements.forEach(ie => {
        ie.originalSrc = ie.src;
        ie.originalAlt = ie.alt;
        ie.newFileBase64 = null;
        ie.newFileName = null;
      });
      s.addedMedia = [];
      s.originalPaddingTop = s.paddingTop;
      s.originalPaddingBottom = s.paddingBottom;
      s.originalElementGap = s.elementGap;
    });

    btn.textContent = 'Deployed!';
    btn.className = 'deploy-btn success';
    setTimeout(() => {
      btn.textContent = 'Deploy Changes';
      btn.className = 'deploy-btn';
      updateChangeCount();
    }, 3000);

    // Start polling for live status
    checkLiveStatus(deployMarker);

    // Refresh preview instantly from new HTML
    loadBlobPreview(newHtml);

    renderSections();
    renderEditor();

  } catch (err) {
    btn.textContent = 'Deploy Failed';
    btn.className = 'deploy-btn error';
    alert('Deploy failed: ' + err.message);
    console.error(err);
    setTimeout(() => {
      btn.textContent = 'Deploy Changes';
      btn.className = 'deploy-btn';
      btn.disabled = false;
    }, 3000);
  } finally {
    hideLoading();
  }
}

function showToast(message, duration = 5000) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast show';
  setTimeout(() => {
    toast.className = 'toast fade-out';
    setTimeout(() => { toast.className = 'toast'; }, 300);
  }, duration);
}

async function checkLiveStatus(deployMarker) {
  const liveUrl = getSiteBaseUrl();
  const maxAttempts = 20; // ~60 seconds
  let attempt = 0;

  const poll = async () => {
    attempt++;
    try {
      const resp = await fetch(liveUrl + '?_cb=' + Date.now(), { cache: 'no-store' });
      const text = await resp.text();
      if (text.includes(deployMarker)) {
        showToast('✓ Changes are live!', 5000);
        return;
      }
    } catch (e) {
      // Ignore fetch errors, keep polling
    }
    if (attempt < maxAttempts) {
      setTimeout(poll, 3000);
    }
    // Silent timeout — no message needed if it takes too long
  };

  // Start polling after a short initial delay (Pages needs time to build)
  setTimeout(poll, 5000);
}

function backToSetup() {
  show('setup');
}

// ==========================================
// ADD MEDIA
// ==========================================
let addMediaState = {
  targetSectionId: null,
  pendingSmallImages: [], // images awaiting resolution decision
  resolvingIndex: 0
};

function getSizeClass(width) {
  if (width >= 1200) return 'full';
  if (width >= 600) return 'half';
  if (width >= 400) return 'third';
  return 'small';
}

function getLayoutHint(addedMedia) {
  if (!addedMedia || addedMedia.length === 0) return 'None';
  return addedMedia.map(am => `${am.displayWidth || 100}%`).join(' + ');
}

function startAddMedia(sectionId) {
  addMediaState.targetSectionId = sectionId;
  document.getElementById('addMediaChooser').click();
}

document.getElementById('addMediaChooser').addEventListener('change', function(e) {
  if (!e.target.files.length || !addMediaState.targetSectionId) return;
  const files = Array.from(e.target.files);
  const sectionId = addMediaState.targetSectionId;
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;

  let processed = 0;
  const toResolve = [];

  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = function(ev) {
      const base64 = ev.target.result.split(',')[1];
      const img = new Image();
      img.onload = function() {
        const w = img.naturalWidth;
        const h = img.naturalHeight;
        const sizeClass = getSizeClass(w);
        // Default display width based on resolution
        const defaultWidth = w >= 1200 ? 100 : w >= 600 ? 50 : w >= 400 ? 33 : 25;
        const mediaItem = {
          id: 'added-' + Date.now() + '-' + Math.random().toString(36).substr(2,5),
          base64: base64,
          fileName: file.name.toLowerCase().replace(/\s+/g, '-'),
          width: w,
          height: h,
          alt: '',
          sizeClass: sizeClass,
          displayWidth: defaultWidth
        };

        if (sizeClass === 'small') {
          toResolve.push(mediaItem);
        } else {
          section.addedMedia.push(mediaItem);
        }

        processed++;
        if (processed === files.length) {
          // All files processed
          if (toResolve.length > 0) {
            addMediaState.pendingSmallImages = toResolve;
            addMediaState.resolvingIndex = 0;
            showResWarning(toResolve[0]);
          } else {
            renderEditor();
            renderSections();
            updateChangeCount();
          }
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  e.target.value = '';
});

function showResWarning(mediaItem) {
  const modal = document.getElementById('resWarningModal');
  const text = document.getElementById('resWarningText');
  text.textContent = `This image is only ${mediaItem.width}px wide. For the best display, we recommend at least 400px wide (ideally 1200px+ for full-width display).`;
  modal.style.display = 'flex';
}

function resModalAction(action) {
  const modal = document.getElementById('resWarningModal');
  const pending = addMediaState.pendingSmallImages;
  const current = pending[addMediaState.resolvingIndex];
  const section = state.sections.find(s => s.id === addMediaState.targetSectionId);

  if (action === 'upload') {
    // Remove this item, re-open file chooser for replacement
    pending.splice(addMediaState.resolvingIndex, 1);
    modal.style.display = 'none';
    // Re-open chooser
    document.getElementById('addMediaChooser').click();
    return;
  }

  if (action === 'grid') {
    // Add at 33% width and prompt for more
    current.displayWidth = 33;
    if (section) section.addedMedia.push(current);
    advanceResModal();
    // After resolving all, open chooser for more
    if (addMediaState.resolvingIndex >= pending.length) {
      renderEditor();
      renderSections();
      updateChangeCount();
      setTimeout(() => {
        document.getElementById('addMediaChooser').click();
      }, 100);
    }
    return;
  }

  if (action === 'anyway') {
    // Add at 25% width with warning
    current.displayWidth = 25;
    if (section) section.addedMedia.push(current);
    advanceResModal();
    return;
  }
}

function advanceResModal() {
  const modal = document.getElementById('resWarningModal');
  const pending = addMediaState.pendingSmallImages;
  addMediaState.resolvingIndex++;

  if (addMediaState.resolvingIndex < pending.length) {
    showResWarning(pending[addMediaState.resolvingIndex]);
  } else {
    modal.style.display = 'none';
    addMediaState.pendingSmallImages = [];
    renderEditor();
    renderSections();
    updateChangeCount();
  }
}

function handleAddedMediaWidth(sectionId, mediaId, value) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  const am = section.addedMedia.find(m => m.id === mediaId);
  if (am) {
    am.displayWidth = parseInt(value, 10);
    renderEditor();
    renderSections();
    updateChangeCount();
  }
}

function handleAddedMediaAlt(sectionId, mediaId, value) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  const am = section.addedMedia.find(m => m.id === mediaId);
  if (am) am.alt = value;
}

function removeAddedMedia(sectionId, mediaId) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  section.addedMedia = section.addedMedia.filter(m => m.id !== mediaId);
  renderEditor();
  renderSections();
  updateChangeCount();
}

// ==========================================
// SPACING & FONT SIZE HANDLERS
// ==========================================
function handlePaddingChange(sectionId, side, value) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  value = parseInt(value, 10);
  if (side === 'top') section.paddingTop = value;
  else section.paddingBottom = value;
  // Update just the display value, not the whole editor (avoids losing slider focus)
  const valSpan = document.getElementById(`pad-${side}-val-${sectionId}`);
  if (valSpan) valSpan.textContent = value + 'px';
  updateChangeCount();
  updateSpacingPreview(section);
}

function handleGapChange(sectionId, value) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  section.elementGap = parseInt(value, 10);
  const valSpan = document.getElementById(`gap-val-${sectionId}`);
  if (valSpan) valSpan.textContent = section.elementGap + 'px';
  updateChangeCount();
  updateSpacingPreview(section);
}

function handleFontSizeChange(sectionId, selector, elementId, value) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  const te = section.textElements.find(t => t.id === elementId);
  if (!te) return;
  te.fontSize = parseInt(value, 10);
  // Update just the font size display, not the whole editor
  const valSpan = document.getElementById(`font-val-${elementId}`);
  if (valSpan) valSpan.textContent = te.fontSize + 'px';
  updateChangeCount();
  // Live preview via postMessage bridge
  postToPreview({ type: 'updateFontSize', selector, value: te.fontSize });
}

function handleFontColorChange(sectionId, selector, elementId, value) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  const te = section.textElements.find(t => t.id === elementId);
  if (!te) return;
  te.fontColor = value;
  updateChangeCount();
  postToPreview({ type: 'updateFontColor', selector, value: te.fontColor });
}

function nudgeColor(sectionId, selector, elementId, direction, btn) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  const te = section.textElements.find(t => t.id === elementId);
  if (!te) return;
  // Parse hex to RGB, nudge toward white or black
  let r = parseInt(te.fontColor.slice(1,3), 16);
  let g = parseInt(te.fontColor.slice(3,5), 16);
  let b = parseInt(te.fontColor.slice(5,7), 16);
  const step = 20;
  if (direction === 'lighter') {
    r = Math.min(255, r + step);
    g = Math.min(255, g + step);
    b = Math.min(255, b + step);
  } else {
    r = Math.max(0, r - step);
    g = Math.max(0, g - step);
    b = Math.max(0, b - step);
  }
  te.fontColor = '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
  updateChangeCount();
  postToPreview({ type: 'updateFontColor', selector, value: te.fontColor });
  // Update the color picker input next to this button
  const colorInput = btn.parentElement.querySelector('input[type="color"]');
  if (colorInput) colorInput.value = te.fontColor;
}

function rgbToHex(color) {
  if (!color) return '#000000';
  // Already hex
  if (color.charAt(0) === '#') {
    if (color.length === 4) {
      return '#' + color[1]+color[1] + color[2]+color[2] + color[3]+color[3];
    }
    return color.length >= 7 ? color.slice(0,7) : color;
  }
  // rgb(r, g, b) or rgba(r, g, b, a)
  const m = color.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
  if (m) {
    return '#' + [m[1],m[2],m[3]].map(v => parseInt(v).toString(16).padStart(2,'0')).join('');
  }
  return '#000000';
}

function updateSpacingPreview(section) {
  postToPreview({
    type: 'updateSpacing',
    selector: section.outerSelector,
    paddingTop: section.paddingTop,
    paddingBottom: section.paddingBottom,
    gap: section.elementGap
  });
}


function scrollPreviewToSection(sectionId) {
  const section = state.sections.find(s => s.id === sectionId);
  if (!section) return;
  postToPreview({ type: 'scrollTo', selector: section.outerSelector });
}

// ==========================================
// HELPERS
// ==========================================
function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
function escapeAttr(str) {
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
// === Column resize drag logic ===
(function() {
  function setupResize(handleId, leftSel, rightSel, useFlexBasis) {
    const handle = document.getElementById(handleId);
    if (!handle) return;
    const body = document.querySelector('.editor-body');
    let dragging = false, startX, startLeftW, startRightW, leftEl, rightEl;

    handle.addEventListener('mousedown', function(e) {
      e.preventDefault();
      leftEl = handle.previousElementSibling;
      rightEl = handle.nextElementSibling;
      startX = e.clientX;
      startLeftW = leftEl.getBoundingClientRect().width;
      startRightW = rightEl.getBoundingClientRect().width;
      dragging = true;
      handle.classList.add('dragging');
      document.body.classList.add('col-resizing');
    });

    document.addEventListener('mousemove', function(e) {
      if (!dragging) return;
      const dx = e.clientX - startX;
      const newLeft = Math.max(120, startLeftW + dx);
      const newRight = Math.max(120, startRightW - dx);
      // Only resize if both columns stay above min
      if (newLeft >= 120 && newRight >= 120) {
        leftEl.style.width = newLeft + 'px';
        leftEl.style.flex = 'none';
        if (rightEl.classList.contains('editor-col')) {
          rightEl.style.flex = '1';
        } else {
          rightEl.style.width = newRight + 'px';
          rightEl.style.flex = 'none';
        }
      }
    });

    document.addEventListener('mouseup', function() {
      if (!dragging) return;
      dragging = false;
      handle.classList.remove('dragging');
      document.body.classList.remove('col-resizing');
    });
  }

  setupResize('resizeHandle1');
  setupResize('resizeHandle2');
})();
</script>
