<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Editor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1729;
  --surface: #1a2332;
  --surface2: #243044;
  --border: #2d3f56;
  --text: #e8e8e8;
  --text-dim: #8899aa;
  --gold: #d4a853;
  --gold-dim: #b8922e;
  --accent: #4a9eff;
  --danger: #ff5555;
  --success: #44cc66;
  --orange: #ff9933;
  --radius: 8px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* === ACCESS CODE GATE === */
#gate {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  background: var(--bg);
}
.gate-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px 48px;
  text-align: center;
  max-width: 480px;
  width: 92%;
}
.gate-box h1 {
  color: var(--gold);
  font-size: 24px;
  margin-bottom: 8px;
}
.gate-box p {
  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 20px;
}
.gate-url-input {
  width: 100%;
  padding: 0.65rem 1rem;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px;
  color: #fff;
  font-size: 0.85rem;
  outline: none;
  margin-bottom: 0.6rem;
  box-sizing: border-box;
}
.gate-url-input:focus { border-color: var(--gold); }
.gate-url-input.error { border-color: var(--danger); animation: shake 0.3s; }
.gate-label {
  display: block;
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  margin-bottom: 0.3rem;
  text-align: left;
}
.gate-input {
  width: 100%;
  padding: 0.65rem 1rem;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.95rem;
  text-align: left;
  letter-spacing: 0.1em;
  outline: none;
  box-sizing: border-box;
  margin-bottom: 0.6rem;
}
.gate-input:focus { border-color: var(--gold); }
.gate-input.error { border-color: var(--danger); animation: shake 0.3s; }
@keyframes shake {
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}
.gate-btn {
  width: 100%;
  padding: 12px;
  margin-top: 16px;
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.gate-btn:hover { background: var(--gold-dim); }
.gate-remember {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8rem;
  color: rgba(255,255,255,0.55);
  cursor: pointer;
  margin-top: 4px;
}
.gate-remember input[type="checkbox"] {
  accent-color: var(--gold);
  width: 16px;
  height: 16px;
  cursor: pointer;
}

/* === SETUP SCREEN === */
#setup {
  display: none;
  align-items: center;
  justify-content: center;
  height: 100vh;
}
.setup-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px;
  max-width: 520px;
  width: 90%;
}
.setup-box h2 { color: var(--gold); margin-bottom: 20px; }
.field { margin-bottom: 16px; }
.field label {
  display: block;
  color: var(--text-dim);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.field input {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.field input:focus { border-color: var(--gold); }
.field .hint { color: var(--text-dim); font-size: 11px; margin-top: 4px; }
.setup-btn {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.setup-btn:hover { background: var(--gold-dim); }
.setup-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* === MAIN EDITOR === */
#editor {
  display: none;
  flex-direction: column;
  height: 100vh;
}
.editor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.editor-header h2 { font-size: 16px; color: var(--gold); }
.editor-header .site-name { color: var(--text-dim); font-size: 13px; }

.editor-body { display: flex; flex: 1; overflow: hidden; }

/* Live preview */
.preview-col {
  width: 35%;
  min-width: 200px;
  display: flex;
  flex-direction: column;
}
.preview-col .col-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
}
.col-header h3 { font-size: 13px; font-weight: 600; }

.col-header a {
  color: var(--accent);
  font-size: 12px;
  text-decoration: none;
}
.preview-col iframe {
  flex: 1;
  width: 100%;
  border: none;
  background: #fff;
}

/* Section list */
.sections-col {
  width: 200px;
  min-width: 120px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  background: var(--surface);
}
.sections-col .col-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.section-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
}
.section-card {
  padding: 10px 12px;
  margin-bottom: 4px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.15s;
}
.section-card:hover { background: var(--surface2); }
.section-card.active { background: var(--surface2); border-left: 3px solid var(--gold); }
.section-card .name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
.section-card .name-input { flex: 1; background: var(--surface2); border: 1px solid var(--gold); color: var(--text); font-size: 13px; padding: 2px 6px; border-radius: 4px; outline: none; }
.section-name-edit { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
.section-name-edit:hover .edit-icon { opacity: 1; }
.section-name-edit .edit-icon { opacity: 0.3; font-size: 12px; transition: opacity 0.2s; }
.section-card .badge {
  background: var(--orange);
  color: var(--bg);
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 10px;
  margin-left: 8px;
}
.section-card .meta {
  color: var(--text-dim);
  font-size: 11px;
  margin-top: 2px;
}
.section-card .delete-btn {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 14px; padding: 2px 4px; opacity: 0; transition: opacity 0.2s;
  margin-left: 4px; line-height: 1;
}
.section-card:hover .delete-btn { opacity: 0.6; }
.section-card .delete-btn:hover { opacity: 1; color: #e74c3c; }
.section-deleted-banner {
  background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.3);
  border-radius: 8px; padding: 20px; text-align: center; margin: 10px 0;
}
.section-deleted-banner p { color: #e74c3c; font-size: 14px; margin: 0 0 10px 0; }
.section-deleted-banner button {
  background: var(--gold); color: var(--bg); border: none; padding: 6px 16px;
  border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600;
}

/* Resize handles */
.resize-handle {
  width: 5px;
  cursor: col-resize;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.15s;
  position: relative;
  z-index: 10;
}
.resize-handle:hover, .resize-handle.dragging {
  background: var(--gold);
}
.resize-handle::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: -3px; right: -3px;
}
body.col-resizing { cursor: col-resize !important; user-select: none !important; }
body.col-resizing iframe { pointer-events: none; }

/* Toast notification */
.toast-container {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10000;
  pointer-events: none;
}
.toast {
  background: var(--surface2);
  border: 1px solid var(--success);
  color: var(--text);
  padding: 12px 24px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  opacity: 0;
  transform: translateY(-10px);
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: auto;
}
.toast.show {
  opacity: 1;
  transform: translateY(0);
}
.toast.fade-out {
  opacity: 0;
  transform: translateY(-10px);
}

/* Editor panel */
.editor-col {
  flex: 1;
  min-width: 200px;
  overflow-y: auto;
  padding: 20px;
  background: var(--bg);
}
.editor-col h3 {
  color: var(--gold);
  font-size: 18px;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.editor-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  font-size: 15px;
}

.element-group {
  margin-bottom: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}
.element-group.changed { border-color: var(--orange); }
.element-group .el-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.element-group .el-tag {
  font-size: 11px;
  text-transform: uppercase;
  color: var(--text-dim);
  letter-spacing: 0.5px;
}
.element-group .el-changed {
  font-size: 10px;
  color: var(--orange);
  font-weight: 600;
}
.element-group textarea,
.element-group input[type="text"] {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  resize: vertical;
  outline: none;
}
.element-group textarea:focus,
.element-group input[type="text"]:focus { border-color: var(--gold); }
.element-group textarea { min-height: 60px; }

.reset-btn {
  margin-top: 6px;
  padding: 4px 10px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  font-size: 11px;
  cursor: pointer;
}
.reset-btn:hover { border-color: var(--text-dim); color: var(--text); }

/* Image elements */
.img-preview {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.img-preview img {
  width: 80px;
  height: 60px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
}
.img-preview .img-info {
  flex: 1;
  font-size: 12px;
  color: var(--text-dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
}
.delete-btn {
  background: none;
  border: 1px solid #e74c3c;
  color: #e74c3c;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 4px;
  cursor: pointer;
  margin-left: 6px;
  transition: background 0.2s, color 0.2s;
}
.delete-btn:hover { background: #e74c3c; color: #fff; }
.swap-btn {
  padding: 6px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
}
.swap-btn:hover { border-color: var(--gold); color: var(--gold); }

/* Deploy bar */
.deploy-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
}
.deploy-bar .change-count {
  font-size: 13px;
  color: var(--text-dim);
}
.deploy-bar .change-count strong { color: var(--orange); }
.deploy-btn {
  padding: 8px 24px;
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.deploy-btn:hover { background: var(--gold-dim); }
.deploy-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.deploy-btn.success { background: var(--success); }
.deploy-btn.error { background: var(--danger); }
.apply-btn {
  padding: 8px 24px;
  background: transparent;
  color: var(--gold);
  border: 1px solid var(--gold);
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-right: 8px;
}
.apply-btn:hover { background: rgba(212, 168, 83, 0.15); }
.apply-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.apply-btn.success { border-color: var(--success); color: var(--success); }
.back-btn {
  padding: 8px 16px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
}
.back-btn:hover { border-color: var(--text-dim); color: var(--text); }

/* Loading */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,23,41,0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text-dim); margin-top: 12px; font-size: 14px; }

/* Scrollbars */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }


/* Reorder buttons */
.reorder-btns {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-left: 6px;
}
.reorder-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  border-radius: 4px;
  width: 24px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 10px;
  padding: 0;
  transition: background 0.15s, color 0.15s;
}
.reorder-btn:hover {
  background: var(--gold);
  color: #000;
}
.reorder-btn:disabled {
  opacity: 0.3;
  cursor: default;
}
.reorder-btn:disabled:hover {
  background: var(--surface);
  color: var(--text-secondary);
}
/* Insert media buttons */
.insert-media-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 6px;
  margin: 4px 0;
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  color: var(--text-secondary);
  font-size: 11px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
  opacity: 0.5;
}
.insert-media-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(212,168,83,0.05);
  opacity: 1;
}
/* Match size button */
.match-size-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
  margin: 6px 0;
  background: rgba(212,168,83,0.08);
  border-radius: var(--radius);
  border: 1px solid rgba(212,168,83,0.2);
}
.match-size-bar label {
  font-size: 11px;
  color: var(--text-secondary);
  white-space: nowrap;
}
.match-size-bar select {
  flex: 1;
  font-size: 12px;
}

/* Add Media button */
.add-media-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  background: transparent;
  border: 2px dashed var(--gold);
  border-radius: var(--radius);
  color: var(--gold);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.add-media-btn:hover {
  background: rgba(212,168,83,0.1);
}

/* Added media items in editor */
.added-media-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
}
.added-media-item img {
  width: 72px;
  height: 54px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.added-media-item .ami-details {
  flex: 1;
  min-width: 0;
}
.added-media-item .ami-dims {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.added-media-item .ami-dims .ami-size-class {
  color: var(--gold);
  font-weight: 600;
}
.added-media-item .ami-warning {
  font-size: 11px;
  color: #ff6b6b;
  margin-bottom: 4px;
}
.added-media-item input {
  width: 100%;
  padding: 5px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 12px;
  outline: none;
}
.added-media-item input:focus { border-color: var(--gold); }
.added-media-item select {
  padding: 4px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--gold);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  outline: none;
  margin-bottom: 4px;
}
.added-media-item select:focus { border-color: var(--gold); }
.ami-remove {
  background: none;
  border: none;
  color: var(--danger);
  font-size: 18px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  flex-shrink: 0;
}
.ami-remove:hover { opacity: 0.7; }
.ami-layout-hint {
  font-size: 11px;
  color: var(--gold);
  margin-top: 10px;
  margin-bottom: 4px;
}

/* Resolution warning modal */
.res-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,23,41,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}
.res-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px 32px;
  max-width: 440px;
  width: 90%;
  text-align: center;
}
.res-modal h3 {
  color: #ff6b6b;
  font-size: 16px;
  margin-bottom: 12px;
}
.res-modal p {
  color: var(--text-dim);
  font-size: 13px;
  margin-bottom: 20px;
  line-height: 1.5;
}
.res-modal-buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.res-modal-buttons button {
  padding: 10px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
}
.res-modal-buttons .btn-primary {
  background: var(--gold);
  color: var(--bg);
}
.res-modal-buttons .btn-primary:hover { background: var(--gold-dim); }
.res-modal-buttons .btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}
.res-modal-buttons .btn-secondary:hover { border-color: var(--text-dim); }

/* === SPACING & FONT SIZE CONTROLS === */
.spacing-controls {
  margin-top: 12px;
  padding: 10px;
  background: #1a1a2e;
  border-radius: 6px;
  border: 1px solid #333;
}
.spacing-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #888;
  margin-bottom: 8px;
}
.spacing-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.spacing-row span:first-child {
  width: 80px;
  font-size: 12px;
  color: #aaa;
}
.spacing-row input[type="range"] {
  flex: 1;
  accent-color: #4a6cf7;
}
.spacing-value {
  width: 45px;
  text-align: right;
  font-size: 12px;
  color: #4a6cf7;
  font-family: monospace;
}
.font-size-control {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
}

<script>
// ==========================================
// CONFIG
// ==========================================
// Multi-site credentials: each entry is { hash, encPat }
// hash = sha256(password), encPat = PAT encrypted with that password via PBKDF2+AES-GCM
const SITE_CREDS = [
  { hash: 'f99acf0dc1b902b0ef7437f2c94acaad0f356678055fe1a585336f6c5ab8948f', encPat: 'qGS4sH5RmcdMAAj+x7gBWWsCU5QtHLoMME3ln0ecLYOoTwdH64toabomf75EI4sLetwxDjwSy0Sk1Px1NbB5AcXAmBFxON5UyYLZeKTrq8pZQkCs' },
  { hash: 'ad1454c7b344ab6c524d0164f993e110f18ab9e9b13bd6f96667875fa335f6e9', encPat: 'BciL7noolZpOBKlAubn5GSd1AR+my/AFmFZQulncsSYrx+9Z1fjrdtozWsyrSq59ZXzgutauysD6iIphI2GSUJsUyPFdD+nNMXSYGJt1zv17wyKv' }
];

// Custom domain → GitHub owner/repo mapping
const CUSTOM_DOMAINS = {
  'travelman.nz': { owner: 'McGroovypants', repo: 'travelman' }
};

async function decryptPat(accessCode, encPat) {
  const blob = Uint8Array.from(atob(encPat), c => c.charCodeAt(0));
  const salt = blob.slice(0, 16);
  const iv = blob.slice(16, 28);
  const ciphertext = blob.slice(28);
  const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(accessCode), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
  return new TextDecoder().decode(decrypted);
}

function parseGithubPagesUrl(url) {
  // Handles https://owner.github.io/repo/, custom domains, or bare domain
  try {
    const u = new URL(url.trim());
    // Check custom domains first
    const domainKey = u.hostname.replace(/^www\./, '');
    if (CUSTOM_DOMAINS[domainKey]) return CUSTOM_DOMAINS[domainKey];
    // Standard GitHub Pages URL
    const hostParts = u.hostname.split('.');
    if (hostParts.length < 3 || hostParts[1] !== 'github' || hostParts[2] !== 'io') return null;
    const owner = hostParts[0];
    const repo = u.pathname.replace(/^\/|\/$/g, '');
    return { owner, repo: repo || '' };
  } catch (e) { return null; }
}

// ==========================================
// STATE
// ==========================================
let undoStack = [];
const MAX_UNDO = 30;

function pushUndo(label) {
  undoStack.push({ label: label || 'change', sections: JSON.parse(JSON.stringify(state.sections)) });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  updateUndoButton();
}

function performUndo() {
  if (undoStack.length === 0) return;
  const snapshot = undoStack.pop();
  state.sections = snapshot.sections;
  renderSections();
  renderEditor();
  updateChangeCount();
  updateUndoButton();
  // Re-apply to preview
  applyChanges();
}

function updateUndoButton() {
  const btn = document.getElementById('undoBtn');
  if (!btn) return;
  btn.disabled = undoStack.length === 0;
  btn.title = undoStack.length > 0 ? 'Undo: ' + undoStack[undoStack.length - 1].label + ' (' + undoStack.length + ')' : 'Nothing to undo';
}

let state = {
  pat: '',
  owner: '',
  repo: '',
  filePath: '',
  originalHtml: '',
  sections: [],
  selectedSectionId: null,
  fileSha: '',
  pendingImageSwap: null // { sectionIdx, elementIdx }
};

// ==========================================
// UTILITIES
// ==========================================
async function sha256(text) {
  const data = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Returns the live site URL, preferring custom domain if one exists
function getSiteBaseUrl() {
  const match = Object.entries(CUSTOM_DOMAINS).find(([domain, info]) =>
    info.owner === state.owner && info.repo === state.repo
  );
  if (match) return `https://${match[0]}/`;
  return `https://${state.owner}.github.io/${state.repo}/`;
}

function show(id) {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('setup').style.display = 'none';
  document.getElementById('editor').style.display = 'none';
  document.getElementById(id).style.display = id === 'editor' ? 'flex' : 'flex';
  const bb = document.getElementById('buildBadge');
  if (bb) bb.textContent = SE_BUILD;
}

function showLoading(text) {
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingOverlay').style.display = 'flex';
}
function hideLoading() {
  document.getElementById('loadingOverlay').style.display = 'none';
}

// ==========================================
// ACCESS CODE
// ==========================================
document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkCode();
});
document.getElementById('siteUrlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('codeInput').focus();
});

// Auto-detect site URL from current page location
(function() {
  const loc = window.location;
  const domainKey = loc.hostname.replace(/^www\./, '');
  if (CUSTOM_DOMAINS[domainKey]) {
    document.getElementById('siteUrlInput').value = `${loc.protocol}//${loc.hostname}/`;
  } else if (loc.hostname.endsWith('.github.io')) {
    const parts = loc.pathname.split('/').filter(Boolean);
    if (parts.length >= 1) {
      const siteUrl = `${loc.protocol}//${loc.hostname}/${parts[0]}/`;
      document.getElementById('siteUrlInput').value = siteUrl;
    }
  }

  // LOCALHOST-ONLY: auto-restore login from sessionStorage so hard-refreshes
  // during local testing don't require re-entering the gate. Never runs on the
  // live domain, and secrets stay only in this browser tab's session.
  try {
    if (_isLocalhost()) {
      const ls = sessionStorage.getItem('se_local_session');
      if (ls) {
        const c = JSON.parse(ls);
        if (c.pat && c.owner && c.repo) {
          state.pat = c.pat;
          state.owner = c.owner;
          state.repo = c.repo;
          state.filePath = 'index.html';
          loadSiteAuto();
          return;
        }
      }
    }
  } catch(e) { /* fall through to normal auto-login / gate */ }

  // Auto-login from remembered device credentials
  try {
    const saved = localStorage.getItem('se_remembered');
    if (saved) {
      const creds = JSON.parse(saved);
      if (creds.pat && creds.owner && creds.repo) {
        state.pat = creds.pat;
        state.owner = creds.owner;
        state.repo = creds.repo;
        state.filePath = 'index.html';
        loadSiteAuto();
      }
    }
  } catch(e) { /* no saved credentials or parse error, show gate normally */ }
})();

// True only when served from localhost / 127.0.0.1 (local testing).
function _isLocalhost() {
  const h = window.location.hostname;
  return h === 'localhost' || h === '127.0.0.1' || h === '[::1]';
}

async function checkCode() {
  const urlInput = document.getElementById('siteUrlInput');
  const codeInput = document.getElementById('codeInput');
  const code = codeInput.value;
  const urlVal = urlInput.value.trim();

  // Parse URL
  const parsed = parseGithubPagesUrl(urlVal);
  if (!parsed) {
    urlInput.classList.add('error');
    setTimeout(() => urlInput.classList.remove('error'), 400);
    return;
  }

  // Check password against known hashes
  const hash = await sha256(code);
  const cred = SITE_CREDS.find(c => c.hash === hash);
  if (!cred) {
    codeInput.classList.add('error');
    setTimeout(() => codeInput.classList.remove('error'), 400);
    codeInput.value = '';
    return;
  }

  try {
    const pat = await decryptPat(code, cred.encPat);
    state.pat = pat;
    state.owner = parsed.owner;
    state.repo = parsed.repo;
    state.filePath = 'index.html';

    // Save credentials if "Remember this device" is checked
    if (document.getElementById('rememberDevice').checked) {
      try {
        localStorage.setItem('se_remembered', JSON.stringify({
          url: urlVal, pat: pat, owner: parsed.owner, repo: parsed.repo
        }));
      } catch(e) { /* localStorage unavailable, skip silently */ }
    }

    // LOCALHOST-ONLY: cache for this tab session so hard-refreshes skip the gate
    if (_isLocalhost()) {
      try {
        sessionStorage.setItem('se_local_session', JSON.stringify({
          pat: pat, owner: parsed.owner, repo: parsed.repo
        }));
      } catch(e) { /* sessionStorage unavailable, skip silently */ }
    }

    loadSiteAuto();
  } catch(e) {
    codeInput.classList.add('error');
    setTimeout(() => codeInput.classList.remove('error'), 400);
    codeInput.value = '';
  }
}

// ==========================================
// BLOB PREVIEW — instant local rendering
// ==========================================
let currentBlobUrl = null;
let _iframeReady = false;
let _previewMsgQueue = [];

// postMessage listener script injected into every blob preview
// ==========================================

function __seDebugPanel(msg) {

  try { console.log('[SE]', msg); } catch (e) {}
}

      if (cur.id) { path.unshift('#' + (window.CSS && CSS.escape ? CSS.escape(cur.id) : cur.id)); break; }
      if (cur.parentElement) {
        var sibs = Array.prototype.filter.call(cur.parentElement.children, function(c){ return c.tagName === cur.tagName; });
        if (sibs.length > 1) { sel += ':nth-of-type(' + (sibs.indexOf(cur) + 1) + ')'; }
      }
      path.unshift(sel);
      cur = cur.parentElement;
    }
    return path.join(' > ');
  }
  // Click-to-locate: clicking an element in the preview tells the editor to
  // select that section and highlight the matching field.
  document.addEventListener('click', function(e) {
    var t = e.target;
    if (!t) return;
    var info = { type: 'previewClick' };
    var img = (t.tagName === 'IMG') ? t : (t.closest ? t.closest('.award-item, .strip-item, .tl-image, figure') : null);
    if (img && img.tagName !== 'IMG') img = img.querySelector('img');
    if (img && img.tagName === 'IMG') {
      info.kind = 'image';
      info.src = img.getAttribute('src') || '';
      info.alt = img.getAttribute('alt') || '';
      info.selector = __seSelector(img);
    } else {
      // text element
      var txt = (t.textContent || '').replace(/\\s+/g, ' ').trim();
      if (txt) { info.kind = 'text'; info.text = txt.slice(0, 120); info.selector = __seSelector(t); }
    }
    if (info.kind) window.parent.postMessage(info, '*');
  }, true);
})();
<\/script>`;

function loadBlobPreview(html) {
  if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);

  // Mark iframe as not ready — messages will be queued
  _iframeReady = false;
  _previewMsgQueue = [];

  const baseUrl = getSiteBaseUrl();

  // Inject <base> tag and postMessage bridge
  let processed = html;
  if (processed.includes('<head>')) {
    processed = processed.replace('<head>', `<head><base href="${baseUrl}">`);
  } else if (processed.includes('<HEAD>')) {
    processed = processed.replace('<HEAD>', `<HEAD><base href="${baseUrl}">`);
  }
  // Inject bridge before </body> (or at end)
  if (processed.includes('</body>')) {
    processed = processed.replace('</body>', PREVIEW_BRIDGE + '</body>');
  } else if (processed.includes('</BODY>')) {
    processed = processed.replace('</BODY>', PREVIEW_BRIDGE + '</BODY>');
  } else {
    processed += PREVIEW_BRIDGE;
  }

  const iframe = document.getElementById('previewFrame');
  const blob = new Blob([processed], { type: 'text/html' });
  currentBlobUrl = URL.createObjectURL(blob);

  // Restore scroll position after load using the Y value saved from scroll events
  const savedY = state._previewScrollY || 0;

  // Set onload BEFORE setting src to avoid race condition
  iframe.onload = function() {
    // Mark iframe as ready and flush queued messages
    _iframeReady = true;
    if (savedY > 10) {
      setTimeout(function() {
        iframe.contentWindow.postMessage({ type: 'scrollToY', y: savedY }, '*');
      }, 150);
    }
    // Request actual computed colors
    const selectors = [];
    state.sections.forEach(section => {
      section.textElements.forEach(te => {
        selectors.push({ id: te.id, selector: te.selector });
      });
      section.imageElements.forEach(ie => {
        selectors.push({ id: ie.id, selector: ie.selector, isImage: true });
      });
    });
    if (selectors.length > 0) {
      postToPreview({ type: 'getComputedColors', selectors: selectors });
    }
    // Flush any messages that were queued while iframe was loading
    const queued = _previewMsgQueue.splice(0);
    queued.forEach(function(msg) { postToPreview(msg); });
  };

  iframe.src = currentBlobUrl;
}

// Track preview scroll position via postMessage from the blob iframe
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'previewClick') {
    handlePreviewClick(e.data);
    return;
  }
  if (e.data && e.data.type === 'previewScroll') {
    if (state) state._previewScrollY = e.data.y;
  }
  if (e.data && e.data.type === 'computedColors') {
    // Only set baselines on initial load, never after Apply/preview rebuilds
    if (!state._computedColorsInitialized) {
      state._computedColorsInitialized = true;
      const results = e.data.results;
      state.sections.forEach(section => {
        section.textElements.forEach(te => {
          if (results[te.id]) {
            const realColor = rgbToHex(results[te.id].color);
            te.fontColor = realColor;
            te.originalFontColor = realColor;
            if (results[te.id].marginBottom !== undefined) {
              te.spacingBelow = results[te.id].marginBottom;
              te.originalSpacingBelow = results[te.id].marginBottom;
            }
          }
        });
        section.imageElements.forEach(ie => {
          if (results[ie.id] && results[ie.id].marginBottom !== undefined) {
            ie.spacingBelow = results[ie.id].marginBottom;
            ie.originalSpacingBelow = results[ie.id].marginBottom;
          }
        });
      });
      // Re-render to show correct baselines in sliders
      renderSections();
    }
  }
});

// ==========================================
// GITHUB API
// ==========================================
async function ghFetch(path, options = {}) {
  const url = `https://api.github.com/repos/${state.owner}/${state.repo}/${path}`;
  const headers = {
    'Authorization': `Bearer ${state.pat}`,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28',
    ...options.headers
  };
  const res = await fetch(url, { ...options, headers });
  if (!res.ok) {
    const body = await res.text();
    throw new Error(`GitHub API ${res.status}: ${body}`);
  }
  return res.json();
}

async function fetchFile(path) {
  const data = await ghFetch(`contents/${path}`);
  const raw = atob(data.content.replace(/\n/g, ''));
  const bytes = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
  const content = new TextDecoder('utf-8').decode(bytes);
  return { content, sha: data.sha };
}

async function pushFile(path, content, message, sha) {
  return ghFetch(`contents/${path}`, {
    method: 'PUT',
    body: JSON.stringify({
      message,
      content: btoa(unescape(encodeURIComponent(content))),
      sha,
      branch: 'main'
    })
  });
}

async function pushBinaryFile(path, base64Content, message) {
  // Check if file exists to get sha
  let sha;
  try {
    const existing = await ghFetch(`contents/${path}`);
    sha = existing.sha;
  } catch (e) {
    sha = undefined;
  }
  const body = { message, content: base64Content, branch: 'main' };
  if (sha) body.sha = sha;
  return ghFetch(`contents/${path}`, {
    method: 'PUT',
    body: JSON.stringify(body)
  });
}

// ==========================================
// FONT DETECTION - scan site HTML for loaded fonts
// ==========================================
function detectSiteFonts(html) {
  const fonts = new Set();
  // Google Fonts from <link> tags
  const linkMatches = html.matchAll(/fonts\.googleapis\.com\/css2?\?family=([^"&]+)/g);
  for (const m of linkMatches) {
    const families = decodeURIComponent(m[1]).split('|');
    families.forEach(f => {
      const name = f.split(':')[0].replace(/\+/g, ' ');
      fonts.add(name);
    });
  }
  // @font-face declarations
  const faceMatches = html.matchAll(/@font-face[^}]*font-family:\s*['"]?([^'";} ]+)/g);
  for (const m of faceMatches) {
    fonts.add(m[1].trim());
  }
  // Common web-safe fonts always available
  const webSafe = ['Arial', 'Helvetica', 'Georgia', 'Times New Roman', 'Verdana', 'Trebuchet MS', 'Courier New', 'Impact'];
  webSafe.forEach(f => fonts.add(f));
  return Array.from(fonts).sort();
}

let detectedFonts = [];

function parseHtml(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const sections = [];

  // Find all sections and major containers — body > div catches unlabelled containers like .quote-block
  const candidates = doc.querySelectorAll('section, [id], header, footer, main, nav, article, body > div');
  const seen = new Set();

  candidates.forEach(el => {
    if (seen.has(el)) return;
    seen.add(el);

    const id = el.id || el.className.split(/\s+/)[0] || `section-${sections.length}`;
    const tag = el.tagName.toLowerCase();

    // Get section name from heading, visible text, or id
    const heading = el.querySelector('h1, h2, h3, h4, h5, h6');
    let name = '';
    if (heading) {
      name = heading.textContent.trim().substring(0, 50);
    } else {
      const candidates = el.querySelectorAll('p, span, a, blockquote, figcaption, cite, em, strong, .tagline, .quote-text, .caption, .hook-text');
      for (const c of candidates) {
        const t = c.textContent.trim();
        if (t && t.length > 3) { name = t.substring(0, 50); break; }
      }
    }
    if (!name) {
      name = el.id ? el.id.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) :
             `${tag} ${sections.length + 1}`;
    }

    // Find text elements
    const textElements = [];
    el.querySelectorAll('h1, h2, h3, h4, h5, h6, p, span, a, blockquote, figcaption, cite, em, strong, li, .tagline, .subtitle, .quote-text, .caption, .award-label, .tl-text, .tl-heading, .tl-year, .hook-text, .hero-tagline, .hero-author, .hero-subtitle, .section-label').forEach(textEl => {
      // Preserve line breaks: convert <br> tags to newlines, then clean up
      const tempClone = textEl.cloneNode(true);
      tempClone.querySelectorAll('br').forEach(br => br.replaceWith('\n'));
      const text = tempClone.textContent.replace(/[ \t]+/g, ' ').replace(/\n /g, '\n').replace(/ \n/g, '\n').trim();
      if (!text || text.length < 2) return;
      // Skip if this is just a container for other elements we'll capture
      if (textEl.querySelector('h1, h2, h3, h4, h5, h6, p')) return;
      // Skip captions inside gallery wrappers — they belong to an image and are
      // edited via the image's Caption field, not as a standalone text box.
      if (textEl.closest('.strip-item')) return;
      if (textEl.closest('.award-item')) return;

      const elTag = textEl.tagName.toLowerCase();
      const selector = buildSelector(textEl);
      if (!selector) return;

      // Extract font size from inline style or default by tag
      let parsedFontSize = 16;
      const fsMatch = (textEl.getAttribute('style') || '').match(/font-size:\s*(\d+)/);
      if (fsMatch) {
        parsedFontSize = parseInt(fsMatch[1], 10);
      } else {
        const tagDefaults = { h1: 48, h2: 36, h3: 28, h4: 24, h5: 20, h6: 18, p: 16, span: 16, a: 16, li: 16, blockquote: 20, figcaption: 14, cite: 14, em: 16, strong: 16 };
        parsedFontSize = tagDefaults[elTag] || 16;
      }

      // Extract font color from inline style (DOMParser docs can't use getComputedStyle)
      let parsedFontColor = '#ffffff';
      const fcMatch = (textEl.getAttribute('style') || '').match(/(?:^|;)\s*color:\s*([^;]+)/);
      if (fcMatch) {
        parsedFontColor = rgbToHex(fcMatch[1].trim());
      }

      // Extract font family from inline style
      let parsedFontFamily = '';
      const ffMatch = (textEl.getAttribute('style') || '').match(/font-family:\s*([^;]+)/);
      if (ffMatch) {
        parsedFontFamily = ffMatch[1].trim();
      }

      textElements.push({
        id: `txt-${textElements.length}`,
        tag: elTag,
        selector,
        content: text,
        originalContent: text,
        innerHTML: textEl.innerHTML.trim(),
        originalInnerHTML: textEl.innerHTML.trim(),
        fontSize: parsedFontSize,
        originalFontSize: parsedFontSize,
        fontColor: parsedFontColor,
        originalFontColor: parsedFontColor,
        fontFamily: parsedFontFamily,
        originalFontFamily: parsedFontFamily,
        spacingBelow: 0,
        originalSpacingBelow: 0
      });
    });

    // Find image elements
    const imageElements = [];
    el.querySelectorAll('img').forEach(img => {
      const src = img.getAttribute('src') || '';
      const alt = img.getAttribute('alt') || '';
      const selector = buildSelector(img);
      if (!selector) return;

      // Parse existing width style for scale
      const imgStyle = img.getAttribute('style') || '';
      const imgWidthMatch = imgStyle.match(/width:\s*(\d+)%/);
      const imgScale = imgWidthMatch ? parseInt(imgWidthMatch[1], 10) : 100;

      // Parse alignment from style
      const imgAlignStyle = img.getAttribute('style') || '';
      let imgAlign = 'center';
      if (imgAlignStyle.match(/object-position:\s*left/)) imgAlign = 'left';
      else if (imgAlignStyle.match(/object-position:\s*right/)) imgAlign = 'right';
      // Also check parent text-align
      const imgParent = img.parentElement;
      if (imgParent) {
        const parentStyle = imgParent.getAttribute('style') || '';
        if (parentStyle.match(/text-align:\s*left/)) imgAlign = 'left';
        else if (parentStyle.match(/text-align:\s*right/)) imgAlign = 'right';
      }

      // Parse vertical offset from margin-top
      const imgMtMatch = imgAlignStyle.match(/margin-top:\s*(-?\d+)px/);
      const imgVertOffset = imgMtMatch ? parseInt(imgMtMatch[1], 10) : 0;

      // === CAPTION LINKING ===
      // Detect a visible caption that belongs to this image. Only gallery
      // wrappers support captions: .award-item (p.award-label) and
      // .strip-item (div.caption). Other images are decorative (alt-only).
      let captionText = '', captionSelector = null, captionTag = 'p', captionClass = '', captionSupported = false;
      let capFontSize = 16, capFontColor = '#ffffff', capFontFamily = '';
      const awardWrap = img.closest('.award-item');
      const stripWrap = img.closest('.strip-item');
      if (awardWrap) { captionSupported = true; captionTag = 'p'; captionClass = 'award-label'; }
      else if (stripWrap) { captionSupported = true; captionTag = 'div'; captionClass = 'caption'; }
      if (captionSupported) {
        const wrap = awardWrap || stripWrap;
        const capEl = wrap.querySelector('.award-label, .caption, [class*="caption"], [class*="label"], figcaption');
        if (capEl) {
          const capClone = capEl.cloneNode(true);
          capClone.querySelectorAll('br').forEach(br => br.replaceWith('\n'));
          captionText = capClone.textContent.replace(/[ \t]+/g, ' ').replace(/\n /g, '\n').replace(/ \n/g, '\n').trim();
          captionSelector = buildSelector(capEl);
          captionTag = capEl.tagName.toLowerCase();
          captionClass = capEl.className || captionClass;
          const cfs = (capEl.getAttribute('style') || '').match(/font-size:\s*(\d+)/);
          if (cfs) capFontSize = parseInt(cfs[1], 10);
          const cfc = (capEl.getAttribute('style') || '').match(/(?:^|;)\s*color:\s*([^;]+)/);
          if (cfc) capFontColor = rgbToHex(cfc[1].trim());
          const cff = (capEl.getAttribute('style') || '').match(/font-family:\s*([^;]+)/);
          if (cff) capFontFamily = cff[1].trim();
        }
      }
      // alt is "linked" to caption when it equals the caption (or no caption yet)
      const altLinked = captionSupported && (alt === captionText || captionText === '');

      imageElements.push({
        id: `img-${imageElements.length}`,
        selector,
        src,
        originalSrc: src,
        alt,
        originalAlt: alt,
        imageScale: imgScale,
        originalImageScale: imgScale,
        alignment: imgAlign,
        originalAlignment: imgAlign,
        verticalOffset: imgVertOffset,
        originalVerticalOffset: imgVertOffset,
        spacingBelow: 0,
        originalSpacingBelow: 0,
        newFileBase64: null,
        newFileName: null,
        // caption linkage
        captionSupported,
        captionText,
        originalCaptionText: captionText,
        captionSelector,
        captionTag,
        captionClass,
        altLinked,
        captionFontSize: capFontSize,
        originalCaptionFontSize: capFontSize,
        captionFontColor: capFontColor,
        originalCaptionFontColor: capFontColor,
        captionFontFamily: capFontFamily,
        originalCaptionFontFamily: capFontFamily,
        captionSpacingBelow: 0,
        originalCaptionSpacingBelow: 0
      });
    });

    // Also find background images
    el.querySelectorAll('[style*="background"]').forEach(bgEl => {
      const style = bgEl.getAttribute('style') || '';
      const match = style.match(/url\(['"]?([^'")\s]+)['"]?\)/);
      if (!match) return;
      const src = match[1];
      const selector = buildSelector(bgEl);
      if (!selector) return;

      // Parse existing background-size for scale
      const bgSizeMatch = style.match(/background-size:\s*(\d+)%/);
      const bgScale = bgSizeMatch ? parseInt(bgSizeMatch[1], 10) : 100;

      imageElements.push({
        id: `bg-${imageElements.length}`,
        selector,
        src,
        originalSrc: src,
        alt: '',
        originalAlt: '',
        isBgImage: true,
        imageScale: bgScale,
        originalImageScale: bgScale,
        alignment: 'center',
        originalAlignment: 'center',
        verticalOffset: 0,
        originalVerticalOffset: 0,
        spacingBelow: 0,
        originalSpacingBelow: 0,
        newFileBase64: null,
        newFileName: null
      });
    });

    if (textElements.length > 0 || imageElements.length > 0) {
      // Extract padding from inline style or default
      let parsedPaddingTop = 40, parsedPaddingBottom = 40, parsedElementGap = 20;
      const elStyle = el.getAttribute('style') || '';
      const ptMatch = elStyle.match(/padding-top:\s*(\d+)/);
      const pbMatch = elStyle.match(/padding-bottom:\s*(\d+)/);
      const gapMatch = elStyle.match(/gap:\s*(\d+)/);
      if (ptMatch) parsedPaddingTop = parseInt(ptMatch[1], 10);
      if (pbMatch) parsedPaddingBottom = parseInt(pbMatch[1], 10);
      if (gapMatch) parsedElementGap = parseInt(gapMatch[1], 10);

      // Find which text element matches the heading (for rename linkage)
      let nameElementId = null;
      if (heading) {
        const headingSelector = buildSelector(heading);
        const headingText = heading.textContent.replace(/\s+/g, ' ').trim();
        const match = textElements.find(te => te.selector === headingSelector || te.content === headingText);
        if (match) nameElementId = match.id;
      }

      sections.push({
        id,
        name,
        originalName: name,
        nameElementId,
        tag,
        textElements,
        imageElements,
        addedMedia: [],
        originalImageOrder: imageElements.map(ie => ie.id),
        outerSelector: buildSelector(el),
        paddingTop: parsedPaddingTop,
        paddingBottom: parsedPaddingBottom,
        elementGap: parsedElementGap,
        originalPaddingTop: parsedPaddingTop,
        originalPaddingBottom: parsedPaddingBottom,
        originalElementGap: parsedElementGap
      });
    }
  });

  return sections;
}

function buildSelector(el) {
  if (el.id) return `#${CSS.escape(el.id)}`;

  const path = [];
  let current = el;
  while (current && current !== document.body && current.nodeType === 1) {
    let selector = current.tagName.toLowerCase();
    if (current.id) {
      path.unshift(`#${CSS.escape(current.id)}`);
      break;
    }
    if (current.parentElement) {
      const siblings = Array.from(current.parentElement.children).filter(c => c.tagName === current.tagName);
      if (siblings.length > 1) {
        const idx = siblings.indexOf(current) + 1;
        selector += `:nth-of-type(${idx})`;
      }
    }
    path.unshift(selector);
    current = current.parentElement;
  }
  return path.join(' > ');
}

// LOAD SITE
// ==========================================
async function loadSite() {
  loadSiteAuto();
}

async function loadSiteAuto() {

  showLoading('Fetching site from GitHub...');

  try {
    const { content, sha } = await fetchFile(state.filePath);
    state.originalHtml = content;
    state.fileSha = sha;

    showLoading('Parsing sections...');
    detectedFonts = detectSiteFonts(content);
    state.sections = parseHtml(content);
    state._computedColorsInitialized = false;
    state.selectedSectionId = state.sections.length > 0 ? state.sections[0].id : null;

    // Setup preview — blob URL for instant rendering
    const siteUrl = getSiteBaseUrl();
    document.getElementById('previewLink').href = siteUrl;
    loadBlobPreview(content);
    document.getElementById('siteLabel').textContent = siteUrl.replace(/^https?:\/\//, '').replace(/\/$/, '');

    renderSections();
    renderEditor();
    updateChangeCount();
    show('editor');
  } catch (err) {
    alert('Failed to load site: ' + err.message);
    console.error(err);
  } finally {
    hideLoading();
  }
}

// === MOBILE NAVIGATION ===
function isMobileView() {
  return window.matchMedia('(max-width: 768px)').matches;
}

function mobileGoTo(view) {
  var editor = document.getElementById('editor');
  editor.setAttribute('data-mobile-view', view);
  var backBtn = document.getElementById('mobileBackBtn');
  var previewBtn = document.getElementById('mobilePreviewBtn');
  var titleEl = document.getElementById('mobileTitle');
  if (view === 'sections') {
    backBtn.style.visibility = 'hidden';
    previewBtn.textContent = 'Preview';
    titleEl.textContent = 'Sections';
  } else if (view === 'editor') {
    backBtn.style.visibility = 'visible';
    backBtn.innerHTML = '&#9664; Sections';
    backBtn.onclick = function() { mobileGoTo('sections'); };
    previewBtn.textContent = 'Preview';
    previewBtn.onclick = function() { mobileGoTo('preview'); };
    var section = state.sections.find(function(s) { return s.id === state.selectedSectionId; });
    titleEl.textContent = section ? section.name : '';
  } else if (view === 'preview') {
    backBtn.style.visibility = 'visible';
    if (state.selectedSectionId) {
      backBtn.innerHTML = '&#9664; Editor';
      backBtn.onclick = function() { mobileGoTo('editor'); };
    } else {
      backBtn.innerHTML = '&#9664; Sections';
      backBtn.onclick = function() { mobileGoTo('sections'); };
    }
    previewBtn.textContent = 'Full';
    previewBtn.classList.add('active');
    titleEl.textContent = 'Preview';
  }
  if (view !== 'preview') previewBtn.classList.remove('active');
}

// Initialise mobile view on load
(function() {
  var editor = document.getElementById('editor');
  if (editor && !editor.hasAttribute('data-mobile-view')) {
    editor.setAttribute('data-mobile-view', 'sections');
  }
})();

function renderSections() {
  const list = document.getElementById('sectionList');
  list.innerHTML = '';

  state.sections.forEach(section => {
    const changes = countSectionChanges(section);
    const card = document.createElement('div');
    card.className = `section-card${section.id === state.selectedSectionId ? ' active' : ''}`;
    card.onclick = () => {
      state.selectedSectionId = section.id;
      renderSections();
      renderEditor();
      scrollPreviewToSection(section.id);
      if (isMobileView()) mobileGoTo('editor');
    };

    const addedCount = section.addedMedia ? section.addedMedia.length : 0;
    let html = `<div style="flex:1;min-width:0;">
      <div class="name" ondblclick="startSectionRename(event, '${section.id}')" title="Double-click to rename">${escapeHtml(section.name)}${section.deleted ? ' <span style="color:#e74c3c;font-size:11px;">[deleted]</span>' : ''}</div>
      <div class="meta">${section.textElements.length}T ${section.imageElements.length}I${addedCount > 0 ? ' +' + addedCount + 'M' : ''}</div>
    </div>`;
    if (changes > 0) {
      html += `<span class="badge">${changes}</span>`;
    }
    if (!section.deleted) {
      html += `<button class="delete-btn" onclick="event.stopPropagation(); deleteSection('${section.id}')" title="Delete section">&#x2715;</button>`;
    } else {
      html += `<button class="delete-btn" style="opacity:1;color:var(--gold);" onclick="event.stopPropagation(); restoreSection('${section.id}')" title="Restore section">&#x21A9;</button>`;
    }
    card.innerHTML = html;
    if (section.deleted) card.style.opacity = '0.5';
    list.appendChild(card);
  });
}

function countSectionChanges(section) {
  let count = 0;
  if (section.name !== section.originalName) count++;
  section.textElements.forEach(te => {
    if (te.content !== te.originalContent) count++;
    if (te.fontSize !== te.originalFontSize) count++;
    if (te.fontColor !== te.originalFontColor) count++;
    if (te.fontFamily !== te.originalFontFamily) count++;
    if (te.spacingBelow !== te.originalSpacingBelow) count++;
  });
  section.imageElements.forEach(ie => {
    if (ie.deleted || ie.src !== ie.originalSrc || ie.alt !== ie.originalAlt || ie.newFileBase64) count++;
    if (ie.imageScale !== ie.originalImageScale) count++;
    if (ie.spacingBelow !== ie.originalSpacingBelow) count++;
    if (ie.captionSupported && ie.captionText !== ie.originalCaptionText) count++;
  });
  if (section.addedMedia && section.addedMedia.length > 0) {
    count += section.addedMedia.length;
  }
  // Check if image order changed
  if (section.originalImageOrder) {
    const currentOrder = section.imageElements.map(ie => ie.id).join(',');
    const origOrder = section.originalImageOrder.join(',');
    if (currentOrder !== origOrder) count++;
  }
  if (section.paddingTop !== section.originalPaddingTop) count++;
  if (section.paddingBottom !== section.originalPaddingBottom) count++;
  if (section.elementGap !== section.originalElementGap) count++;
  return count;
}

// ==========================================
// RENDER EDITOR
// ==========================================
function renderEditor() {
  const col = document.getElementById('editorCol');
  const section = state.sections.find(s => s.id === state.selectedSectionId);

  if (!section) {
    col.innerHTML = '<div class="editor-empty">Select a section to edit</div>';

  // Show deleted banner for deleted sections
  if (section.deleted) {
    col.innerHTML = '<div class="section-deleted-banner"><p>This section has been marked for deletion.</p><p style="color:var(--text-dim);font-size:12px;margin-bottom:10px;">It will be removed when you Apply or Deploy.</p><button onclick="restoreSection(\'' + section.id + '\')">Restore Section</button></div>';
    return;
  }

  try {
  // Begin try block for error capture

  const nameChanged = section.name !== section.originalName;
  let html = `<h3 class="section-name-edit" onclick="startSectionRenamePanel('${section.id}')">
    <span id="section-name-display-${section.id}">${escapeHtml(section.name)}</span>
    <span class="edit-icon">&#9998;</span>

  </h3>`;

  // Section spacing controls (top, so always visible on section select)
  html += `<div class="spacing-controls">
    <div class="spacing-label">Section Spacing</div>
    <div class="spacing-row">
      <span>Pad Top</span>
      <input type="range" min="0" max="120" step="4" value="${section.paddingTop}"
        oninput="handlePaddingChange('${section.id}', 'top', this.value)">

    </div>
    <div class="spacing-row">
      <span>Pad Bottom</span>
      <input type="range" min="0" max="120" step="4" value="${section.paddingBottom}"
        oninput="handlePaddingChange('${section.id}', 'bottom', this.value)">
      <span class="spacing-value" id="pad-bottom-val-${section.id}">${section.paddingBottom}px</span>
    </div>
    <div class="spacing-row">
      <span>Element Gap</span>
      <input type="range" min="0" max="60" step="4" value="${section.elementGap}"
        oninput="handleGapChange('${section.id}', this.value)">

    </div>
  </div>`;

  // Text elements
  section.textElements.forEach((te, i) => {
    const changed = te.content !== te.originalContent;
    const fontChanged = te.fontSize !== te.originalFontSize || te.fontFamily !== te.originalFontFamily;
    const colorChanged = te.fontColor !== te.originalFontColor;
    const spacingChanged = te.spacingBelow !== te.originalSpacingBelow;
    const anyChange = changed || fontChanged || colorChanged || spacingChanged;
    const fontSizes = [12,14,16,18,20,24,28,32,36,40,48,56,64,72];
    html += `<div class="element-group${anyChange ? ' changed' : ''}">
      <div class="el-label">
        <span class="el-tag">${te.tag}</span>
        ${anyChange ? '<span class="el-changed">Modified</span>' : ''}
      </div>
      <textarea data-section="${section.id}" data-element="${te.id}" data-type="text" rows="${Math.max(2, te.content.split('\\n').length + 1, Math.ceil(te.content.length / 60))}"
        oninput="handleTextEdit(this)" onfocus="handleTextEditFocus(this)" onblur="handleTextEditBlur()">${escapeHtml(te.content)}</textarea>
      <div class="font-size-control">
        <span>Size</span>
        <select onchange="handleFontSizeChange('${section.id}','${te.selector}','${te.id}',this.value)">
          ${fontSizes.map(sz => '<option value="' + sz + '"' + (te.fontSize === sz ? ' selected' : '') + '>' + sz + 'px</option>').join('')}
        </select>
        <input type="number" min="8" max="120" value="${te.fontSize}" class="font-size-input"
          onchange="handleFontSizeChange('${section.id}','${te.selector}','${te.id}',this.value)">
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
          <label style="font-size:11px;color:#888;white-space:nowrap;">Font:</label>
          <select style="flex:1;padding:3px 6px;font-size:12px;border:1px solid #ddd;border-radius:4px;background:#1a1a2e;color:#eee;${te.fontFamily !== te.originalFontFamily ? 'border-color:#e67e22;' : ''}"
            onchange="handleFontFamilyChange('${section.id}','${te.id}',this.value)">
            <option value="${te.originalFontFamily}">${te.originalFontFamily ? 'Original (' + te.originalFontFamily.split(',')[0].replace(/['\"/]/g,'').trim() + ')' : 'Default'}</option>
            ${detectedFonts.map(f => '<option value="' + f + '"' + (te.fontFamily === f ? ' selected' : '') + '>' + f + '</option>').join('')}
          </select>
          ${te.fontFamily !== te.originalFontFamily ? '<button class="reset-btn" style="margin:0;padding:2px 6px;font-size:10px;" onclick="resetFontFamily(\x27' + section.id + '\x27,\x27' + te.id + '\x27)">Reset</button>' : ''}
      </div>
      <div class="font-color-control">
        <span>Colour</span>
        <input type="color" value="${te.fontColor}" onchange="handleFontColorChange('${section.id}','${te.selector}','${te.id}',this.value)">
        <button onclick="nudgeColor('${section.id}','${te.selector}','${te.id}','lighter',this)">Lighter</button>
        <button onclick="nudgeColor('${section.id}','${te.selector}','${te.id}','darker',this)">Darker</button>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
        <label style="font-size:11px;color:#888;white-space:nowrap;">Space below:</label>
        <input type="range" min="0" max="80" step="2" value="${te.spacingBelow}"
          style="flex:1;accent-color:${te.spacingBelow !== te.originalSpacingBelow ? '#e67e22' : '#3498db'};"
          oninput="handleElementSpacing('${section.id}','${te.id}','text',this.value)"
          title="${te.spacingBelow}px">
        <span style="font-size:11px;color:#888;min-width:30px;">${te.spacingBelow}px</span>
      </div>
      ${anyChange ? `<button class="reset-btn" onclick="resetElement('${section.id}','${te.id}','text')">Reset</button>` : ''}
    </div>`;
  });

  // Image elements
  // Group addedMedia by insertAfterImageId for inline rendering
  const mediaByImageId = {};
  const unassociatedMedia = [];
  if (section.addedMedia && section.addedMedia.length > 0) {
    section.addedMedia.forEach((am, i) => {
      am._globalIdx = i;
      if (am.insertAfterImageId) {
        if (!mediaByImageId[am.insertAfterImageId]) mediaByImageId[am.insertAfterImageId] = [];
        mediaByImageId[am.insertAfterImageId].push(am);
      } else {
        unassociatedMedia.push(am);
      }
    });
  }

  const visibleImages = section.imageElements.filter(x => !x.deleted);
  section.imageElements.forEach((ie, i) => {
    const changed = ie.src !== ie.originalSrc || ie.alt !== ie.originalAlt || ie.newFileBase64 || ie.imageScale !== ie.originalImageScale || ie.alignment !== ie.originalAlignment || ie.verticalOffset !== ie.originalVerticalOffset || ie.spacingBelow !== ie.originalSpacingBelow;
    const imgSrc = ie.newFileBase64 ?
      'data:image/jpeg;base64,' + ie.newFileBase64 :
      resolveImageUrl(ie.src);
    const visIdx = visibleImages.indexOf(ie);

    if (ie.deleted) {
      html += '<div class="element-group changed">';
      html += '  <div class="el-label">';
      html += '    <span class="el-tag">' + (ie.isBgImage ? 'background' : 'image') + '</span>';
      html += '    <span class="el-changed" style="color:#e74c3c;">Deleted</span>';
      html += '  </div>';
      html += '  <div style="padding:8px 0;color:#888;font-size:12px;">';
      html += '    <em>' + escapeHtml(ie.originalSrc.split('/').pop()) + '</em> will be removed on deploy';
      html += '    <button class="reset-btn" onclick="restoreImage(\'' + section.id + '\',\'' + ie.id + '\')">Undo Delete</button>';
      html += '  </div>';
      html += '</div>';
    } else {
      html += '<div class="element-group' + (changed ? ' changed' : '') + '">';
      html += '  <div class="el-label">';
      html += '    <span class="el-tag">' + (ie.isBgImage ? 'background' : 'image') + '</span>';
      html += (changed ? '    <span class="el-changed">Modified</span>' : '');
      html += '  </div>';
      html += '  <div style="display:flex;align-items:flex-start;gap:6px;">';
      html += '    <div style="flex:1;">';
      html += '      <div class="img-preview">';
      html += '        <img src="' + imgSrc + '" alt="' + escapeAttr(ie.alt) + '" onerror="this.style.display=\'none\'">';
      html += '        <div class="img-info">' + escapeHtml(ie.src.split('/').pop()) + '</div>';
      html += '        <div style="margin:6px 0;display:flex;align-items:center;gap:8px;">';
      html += '          <label style="font-size:11px;color:#888;white-space:nowrap;">Size:</label>';
      html += '          <input type="range" min="20" max="200" step="10" value="' + ie.imageScale + '"';
      html += '            style="flex:1;cursor:pointer;"';
      html += '            oninput="handleImageScale(\'' + section.id + '\',\'' + ie.id + '\',parseInt(this.value));this.nextElementSibling.textContent=this.value+\'%\'">';
      html += '          <span style="font-size:12px;font-weight:600;min-width:40px;text-align:right;' + (ie.imageScale !== ie.originalImageScale ? 'color:#e67e22;' : '') + '">' + ie.imageScale + '%</span>';
      html += '        </div>';
      html += '        <div style="margin:6px 0;display:flex;align-items:center;gap:8px;">';
      html += '          <label style="font-size:11px;color:#888;white-space:nowrap;">Align:</label>';
      html += '          <div style="display:flex;gap:2px;">';
      html += '            <button style="padding:2px 8px;font-size:11px;border:1px solid ' + (ie.alignment === 'left' ? '#e67e22' : '#555') + ';background:' + (ie.alignment === 'left' ? '#2a1a0a' : '#1a1a2e') + ';color:#eee;border-radius:3px 0 0 3px;cursor:pointer;" onclick="handleImageAlignment(\'' + section.id + '\',\'' + ie.id + '\',\'left\')">Left</button>';
      html += '            <button style="padding:2px 8px;font-size:11px;border:1px solid ' + (ie.alignment === 'center' ? '#e67e22' : '#555') + ';background:' + (ie.alignment === 'center' ? '#2a1a0a' : '#1a1a2e') + ';color:#eee;cursor:pointer;" onclick="handleImageAlignment(\'' + section.id + '\',\'' + ie.id + '\',\'center\')">Centre</button>';
      html += '            <button style="padding:2px 8px;font-size:11px;border:1px solid ' + (ie.alignment === 'right' ? '#e67e22' : '#555') + ';background:' + (ie.alignment === 'right' ? '#2a1a0a' : '#1a1a2e') + ';color:#eee;border-radius:0 3px 3px 0;cursor:pointer;" onclick="handleImageAlignment(\'' + section.id + '\',\'' + ie.id + '\',\'right\')">Right</button>';
      html += '          </div>';
      html += '        </div>';
      html += '        <div style="margin:6px 0;display:flex;align-items:center;gap:8px;">';
      html += '          <label style="font-size:11px;color:#888;white-space:nowrap;">V-Offset:</label>';
      html += '          <input type="range" min="-100" max="100" step="5" value="' + ie.verticalOffset + '"';
      html += '            style="flex:1;accent-color:' + (ie.verticalOffset !== ie.originalVerticalOffset ? '#e67e22' : '#3498db') + ';"';
      html += '            oninput="handleImageVerticalOffset(\'' + section.id + '\',\'' + ie.id + '\',parseInt(this.value));this.nextElementSibling.textContent=this.value+\'px\'">';
      html += '          <span style="font-size:12px;font-weight:600;min-width:40px;text-align:right;' + (ie.verticalOffset !== ie.originalVerticalOffset ? 'color:#e67e22;' : '') + '">' + ie.verticalOffset + 'px</span>';
      html += '        </div>';
      
      html += '        <button class="swap-btn" onclick="startImageSwap(\'' + section.id + '\',\'' + ie.id + '\')">Swap</button>';
      html += '        <button class="delete-btn" onclick="deleteImage(\'' + section.id + '\',\'' + ie.id + '\')">Delete</button>';
      html += '      </div>';
      // === CAPTION (visible text under photo) — only for caption-supporting wrappers ===
      if (ie.captionSupported) {
        const capChanged = ie.captionText !== ie.originalCaptionText;
        html += '      <div style="margin-top:8px;">';
        html += '        <label style="font-size:11px;color:#888;display:block;margin-bottom:3px;">Caption (shown under photo)' + (capChanged ? ' <span style="color:#e67e22;">• edited</span>' : '') + '</label>';
        html += '        <input type="text" data-section="' + section.id + '" data-element="' + ie.id + '" data-type="caption"';
        html += '          oninput="handleCaptionEdit(this)" onfocus="handleCaptionEditFocus(this)" onblur="handleCaptionEditBlur()" value="' + escapeAttr(ie.captionText) + '" placeholder="Type a caption (leave blank for none)">';
        html += '      </div>';
      }
      // === ALT TEXT (accessibility — not shown on page) ===
      // For caption-supporting images, collapse alt behind a toggle so the
      // client isn't shown duplicated text. Expanded only when user opens it.
      if (ie.captionSupported && !ie._altOpen) {
        html += '      <div style="margin-top:6px;">';
        html += '        <span style="font-size:11px;color:#777;cursor:pointer;text-decoration:underline;" onclick="toggleAltEdit(\'' + section.id + '\',\'' + ie.id + '\')">Alt text (click to edit)</span>';
        html += '      </div>';
      } else {
        html += '      <div style="margin-top:6px;">';
        html += '        <label style="font-size:11px;color:#888;display:block;margin-bottom:3px;">Alt text (accessibility — not shown on page)';
        if (ie.captionSupported) {
          html += ie.altLinked
            ? ' <span style="color:#3498db;">↻ mirrors caption</span>'
            : ' <span style="color:#888;cursor:pointer;text-decoration:underline;" onclick="relinkAlt(\'' + section.id + '\',\'' + ie.id + '\')">reset to caption</span>';
          html += ' <span style="color:#777;cursor:pointer;text-decoration:underline;margin-left:6px;" onclick="toggleAltEdit(\'' + section.id + '\',\'' + ie.id + '\')">hide</span>';
        }
        html += '</label>';
        html += '        <input type="text" data-section="' + section.id + '" data-element="' + ie.id + '" data-type="alt"';
        html += '          oninput="handleAltEdit(this)" onfocus="handleAltEditFocus(this)" onblur="handleAltEditBlur()" value="' + escapeAttr(ie.alt) + '" placeholder="Describe the image">';
